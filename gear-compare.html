<body class="page-gear-compare">

    <div class="container">
        <h1>AION Gear Comparison</h1>
        <div class="subtitle">Compare two gear loadouts side by side | AION Retail 8.x</div>
        <div class="gc-share-bar">
            <button class="gc-share-btn" id="gc-share-btn" title="Copy shareable link to clipboard">🔗 Share Setup</button>
            <span class="gc-share-toast" id="gc-share-toast"></span>
        </div>

        <!-- Shared Class Selector -->
        <div class="gc-class-selector" id="class-selector"></div>

        <!-- Tab Bar -->
        <div class="gc-tab-bar" id="gc-tab-bar">

            <button class="gc-tab" data-tab="transforms">✨ Transformations</button>
        </div>

        <!-- Equipment Tab -->
        <div class="gc-tab-panel gc-tab-panel-active" id="tab-equipment">

                <div class="gc-profile" id="profile-2"></div>

        <!-- Transformations Tab -->
        <div class="gc-tab-panel" id="tab-transforms">

        <div class="gc-comparison" id="comparison-panel"></div>

        <div id="site-footer"></div>

    <script src="assets/js/site-common.js"></script>
    <script>
    (function() {
        'use strict';

        // ═══════════════════════════════════════════════════════════
        // DATA CONSTANTS
        // ═══════════════════════════════════════════════════════════

        // One-handed: dagger, sword, mace, revolver
        // Two-handed: everything else
        var WEAPON_TYPES = {
            dagger:     { name: 'Dagger',      icon: 'assets/icons/icon_item_equip_dagger_f01.png', twoHanded: false },
            sword:      { name: 'Sword',       icon: 'assets/icons/icon_item_equip_sword_f01.png', twoHanded: false },
            mace:       { name: 'Mace',        icon: 'assets/icons/icon_item_equip_mace_f01.png', twoHanded: false },
            revolver:   { name: 'Revolver',    icon: 'assets/icons/icon_item_equip_gun_f01.png', twoHanded: false },
            greatsword: { name: 'Greatsword',  icon: 'assets/icons/icon_item_equip_2hsword_f01.png', twoHanded: true },
            polearm:    { name: 'Polearm',     icon: 'assets/icons/icon_item_equip_polearm_f01.png', twoHanded: true },
            bow:        { name: 'Bow',         icon: 'assets/icons/icon_item_equip_bow_f01.png', twoHanded: true },
            staff:      { name: 'Staff',       icon: 'assets/icons/icon_item_equip_staff_f01.png', twoHanded: true },
            paintRings: { name: 'Paint Rings', icon: 'assets/icons/icon_item_equip_spray_f01.png', twoHanded: true },
            orb:        { name: 'Orb',         icon: 'assets/icons/icon_item_equip_orb_f01.png', twoHanded: true },
            spellbook:  { name: 'Spellbook',   icon: 'assets/icons/icon_item_equip_book_f01.png', twoHanded: true },
            aetherKey:  { name: 'Aether Key',  icon: 'assets/icons/icon_item_equip_keyblade_f01.png', twoHanded: true },
            cannon:     { name: 'Cannon',      icon: 'assets/icons/icon_item_equip_cannon_f01.png', twoHanded: true },
            harp:       { name: 'Harp',        icon: 'assets/icons/icon_item_equip_harp_f01.png', twoHanded: true }
        };

        // Shield-compatible main-hand weapons
        var SHIELD_WEAPONS = ['dagger', 'sword', 'mace'];

        // Mace can only use shield (no off-hand weapon, no fuse)
        var MACE_OH_ONLY = ['none', 'shield'];

        // Compute allowed off-hand types for a given main weapon + class
        function getAllowedOffHand(mainType, className) {
            var is2H = WEAPON_TYPES[mainType].twoHanded;
            if (is2H) return ['none', 'fuse'];
            if (mainType === 'mace') return ['none', 'shield'];
            if (mainType === 'sword' && className === 'templar') return ['none', 'shield'];
            var opts = ['none', 'weapon'];
            if (SHIELD_WEAPONS.indexOf(mainType) !== -1) opts.push('shield');
            return opts;
        }

        // Compute default off-hand type when switching main weapon
        function getDefaultOffHand(mainType, className) {
            var is2H = WEAPON_TYPES[mainType].twoHanded;
            if (is2H) return 'fuse';
            if (mainType === 'mace') return 'shield';
            if (mainType === 'sword' && className === 'templar') return 'shield';
            return 'weapon';
        }

        // Compute default off-hand weapon type based on main weapon
        function getDefaultOffHandWeapon(mainType, className) {
            if (mainType === 'dagger') return 'sword';
            var cls = CLASS_DATA[className];
            var oneHanded = cls.weapons.filter(function(w) { return !WEAPON_TYPES[w].twoHanded; });
            return oneHanded[0] || cls.weapons[0];
        }

        var SHIELD_ICON = 'assets/icons/icon_item_equip_shield_f01.png';
        var NONE_ICON   = 'assets/icons/icon_frame_2.png';

        // Build flat list of off-hand choices: [{key, icon, label}]
        // key format: 'none', 'shield', 'fuse', 'weapon:dagger', 'weapon:sword', etc.
        function getOffHandChoices(mainType, className) {
            var choices = [];
            var allowed = getAllowedOffHand(mainType, className);
            choices.push({ key: 'none', icon: NONE_ICON, label: 'None' });
            if (allowed.indexOf('shield') !== -1) {
                choices.push({ key: 'shield', icon: SHIELD_ICON, label: 'Shield' });
            }
            if (allowed.indexOf('fuse') !== -1) {
                choices.push({ key: 'fuse', icon: WEAPON_TYPES[mainType].icon, label: 'Fuse' });
            }
            if (allowed.indexOf('weapon') !== -1) {
                var cls = CLASS_DATA[className];
                var oneHanded = cls.weapons.filter(function(w) { return !WEAPON_TYPES[w].twoHanded; });
                oneHanded.forEach(function(wKey) {
                    choices.push({ key: 'weapon:' + wKey, icon: WEAPON_TYPES[wKey].icon, label: WEAPON_TYPES[wKey].name });
                });
            }
            return choices;
        }

        // Get current off-hand choice key from weaponConfig
        function getCurrentOffHandKey() {
            if (weaponConfig.offHandType === 'weapon') return 'weapon:' + weaponConfig.offHandWeaponType;
            return weaponConfig.offHandType;
        }

        // Armor slots (matches Excel order)
        var ARMOR_SLOTS = [
            { key: 'shoulders', iconKey: 'shoulder' },
            { key: 'helmet',    iconKey: 'head' },
            { key: 'chest',     iconKey: 'torso' },
            { key: 'pants',     iconKey: 'pants' },
            { key: 'gloves',    iconKey: 'glove' },
            { key: 'boots',     iconKey: 'shoes' }
        ];

        // Armor material → icon URL prefix
        var ARMOR_MAT_PREFIX = { plate: 'pl', chain: 'ch', leather: 'lt', cloth: 'rb' };

        function getArmorIcon(material, slotIconKey) {
            return 'assets/icons/icon_item_equip_' + ARMOR_MAT_PREFIX[material] + '_' + slotIconKey + '_f01.png';
        }
        function getArmorMaterial(armorType) {
            return armorType.split('-')[1]; // 'physical-plate' → 'plate'
        }

        var ARMOR_TYPE_OPTIONS = [
            { key: 'physical-plate',   name: 'Phys. Plate',   material: 'plate' },
            { key: 'magical-plate',    name: 'Mag. Plate',    material: 'plate' },
            { key: 'physical-chain',   name: 'Phys. Chain',   material: 'chain' },
            { key: 'magical-chain',    name: 'Mag. Chain',    material: 'chain' },
            { key: 'physical-leather', name: 'Phys. Leather', material: 'leather' },
            { key: 'magical-leather',  name: 'Mag. Leather',  material: 'leather' },
            { key: 'physical-cloth',   name: 'Phys. Cloth',   material: 'cloth' },
            { key: 'magical-cloth',    name: 'Mag. Cloth',    material: 'cloth' }
        ];

        var ARMOR_SETS = [
            { key: 'fighting-spirit', name: 'Fighting Spirit' },
            { key: 'acrimony',        name: 'Acrimony' },
            { key: 'presumption',     name: 'Presumption' }
        ];

        var WEAPON_SETS = [
            { key: 'acrimony',        name: 'Acrimony' },
            { key: 'presumption',     name: 'Presumption' },
            { key: 'salvation',       name: 'Salvation (Upgraded FS)' },
            { key: 'fighting-spirit', name: 'Fighting Spirit' },
            { key: 'spiked',          name: 'Spiked (PvP)' },
            { key: 'ciclonica-helper',name: 'Ciclonica/Helper (PvE)' },
            { key: 'jorgoth-t4-v1',   name: 'Jorgoth T4 v1' },
            { key: 'jorgoth-t4-v2',   name: 'Jorgoth T4 v2' },
            { key: 'jorgoth-t4-v3',   name: 'Jorgoth T4 v3' },
            { key: 'jorgoth-t3-v1',   name: 'Jorgoth T3 v1' },
            { key: 'jorgoth-t3-v2',   name: 'Jorgoth T3 v2' },
            { key: 'jorgoth-t3-v3',   name: 'Jorgoth T3 v3' },
            { key: 'vision',          name: 'Vision' }
        ];

        // Sets that are main-hand exclusive (not available for off-hand/fuse)
        var OFFHAND_EXCLUDED_SETS = ['acrimony', 'presumption', 'vision'];

        // Sets available only for off-hand/fuse (not main-hand)
        var MAINHAND_EXCLUDED_SETS = ['jorgoth-t3-v1', 'jorgoth-t3-v2', 'jorgoth-t3-v3'];

        var OATH_OPTIONS = [
            { key: 'none',         name: 'None',         rank: 0 },
            { key: 'silent-skill', name: 'Silent Skill', rank: 0 },
            { key: 'legendary-1',  name: 'Legendary 1',  rank: 1 },
            { key: 'legendary-2',  name: 'Legendary 2',  rank: 2 },
            { key: 'legendary-3',  name: 'Legendary 3',  rank: 3 },
            { key: 'ultimate-1',   name: 'Ultimate 1',   rank: 4 },
            { key: 'ultimate-2',   name: 'Ultimate 2',   rank: 5 },
            { key: 'ultimate-3',   name: 'Ultimate 3',   rank: 6 }
        ];

        // ── Manastone System ──
        var MANASTONE_ICON = 'assets/icons/icon_item_matter_option_f01.png';
        var EMPTY_SLOT_ICON = 'assets/icons/icon_option_slot.png';

        var MANASTONES = [
            { key: 'attack',      name: 'Attack',       stat: 'attack',      value: 23 },
            { key: 'crit',        name: 'Crit',         stat: 'crit',        value: 86 },
            { key: 'accuracy',    name: 'Accuracy',     stat: 'accuracy',    value: 94 },
            { key: 'hp',          name: 'HP',            stat: 'hp',          value: 290 },
            { key: 'evasion',     name: 'Evasion',      stat: 'evasion',     value: 94 },
            { key: 'healBoost',   name: 'Healing Boost', stat: 'healingBoost', value: 12 },
            { key: 'pdef',        name: 'Physical Def',  stat: 'physicalDef', value: 24 },
            { key: 'mdef',        name: 'Magical Def',   stat: 'magicalDef',  value: 24 },
            { key: 'magicResist', name: 'Magic Resist',  stat: 'magicResist', value: 94 },
            { key: 'block',       name: 'Block',         stat: 'block',       value: 94 },
            { key: 'parry',       name: 'Parry',         stat: 'parry',       value: 94 }

        var MANASTONE_KEYS = MANASTONES.map(function(m) { return m.key; });

        var MANASTONE_PRESETS = [
            { key: 'full-attack',   name: 'Full Attack',      mana: 'attack' },
            { key: 'full-crit',     name: 'Full Crit',        mana: 'crit' },
            { key: 'full-accuracy', name: 'Full Accuracy',    mana: 'accuracy' },
            { key: 'full-hp',       name: 'Full HP',          mana: 'hp' },
            { key: 'full-evasion',  name: 'Full Evasion',     mana: 'evasion' },
            { key: 'full-mresist',  name: 'Full Magic Resist', mana: 'magicResist' },
            { key: 'full-pdef',     name: 'Full Phys. Def',   mana: 'pdef' },
            { key: 'full-mdef',     name: 'Full Mag. Def',    mana: 'mdef' },
            { key: 'full-block',    name: 'Full Block',       mana: 'block' },
            { key: 'full-parry',    name: 'Full Parry',       mana: 'parry' }
        ];

        // Get number of manastone slots for a gear piece
        function getManastoneSlotCount(setKey) {
            if (setKey === 'acrimony' || setKey === 'presumption') return 1;
            return 3;
        }

        // Oath stat bonuses per pair type
        // shoulders+helmet → HP + ACC (accuracy + magicalAccuracy)
        // chest+pants      → HP + DEF (physicalDef + magicalDef)
        // gloves+boots     → HP + ATK (attack)
        // Both slots must have a real oath (not none/silent-skill) to activate
        var OATH_BONUS = {
            'none':         { hp: 0,    def: 0,   attack: 0,   acc: 0 },
            'silent-skill': { hp: 0,    def: 0,   attack: 0,   acc: 0 },
            'legendary-1':  { hp: 1000, def: 100, attack: 100, acc: 300 },
            'legendary-2':  { hp: 1250, def: 125, attack: 125, acc: 375 },
            'legendary-3':  { hp: 1500, def: 150, attack: 150, acc: 450 },
            'ultimate-1':   { hp: 2500, def: 250, attack: 250, acc: 750 },
            'ultimate-2':   { hp: 3500, def: 350, attack: 350, acc: 1050 },
            'ultimate-3':   { hp: 5000, def: 500, attack: 500, acc: 1500 }
        };

        // Oath icon URL parts per slot
        var OATH_SLOT_ICON = {
            shoulders: 'shoulder', helmet: 'head', chest: 'torso',
            pants: 'leg', gloves: 'glove', boots: 'foot'
        };

        // Oath pairs: the two slots in each pair share one oath bonus
        var OATH_PAIRS = [
            ['shoulders', 'helmet'],
            ['chest', 'pants'],
            ['gloves', 'boots']
        ];

        function getOathIconTier(oathKey) {
            if (oathKey === 'ultimate-3') return 'g6';
            if (oathKey === 'ultimate-1' || oathKey === 'ultimate-2') return 'g4';
            if (oathKey === 'legendary-1' || oathKey === 'legendary-2' || oathKey === 'legendary-3') return 'g1';
            return null;
        }

        var SILENT_SKILL_ICONS = {
            shoulders: 'assets/icons/icon_item_rb_shoulder_s01.png',
            helmet:    'assets/icons/icon_item_ac_head_s05.png',
            chest:     'assets/icons/icon_item_rb_torso_s01.png',
            pants:     'assets/icons/icon_item_rb_pants_s01.png',
            gloves:    'assets/icons/icon_item_rb_glove_s01.png',
            boots:     'assets/icons/icon_item_rb_shoes_s01.png'
        };

        var OATH_FRAME = 'assets/icons/icon_frame_2.png';

        function getOathIcon(slotKey, oathKey) {
            if (oathKey === 'silent-skill') return SILENT_SKILL_ICONS[slotKey] || null;
            var tier = getOathIconTier(oathKey);
            if (!tier) return null;
            return 'assets/icons/vs_armor_' + OATH_SLOT_ICON[slotKey] + '_a_' + tier + '.png';
        }

        function getOathRank(oathKey) {
            var opt = OATH_OPTIONS.find(function(o) { return o.key === oathKey; });
            return opt ? opt.rank : 0;
        }

        // For a pair, both slots must have a real oath to activate
        function isRealOath(oathKey) {
            return oathKey !== 'none' && oathKey !== 'silent-skill';
        }

        function getEffectiveOath(oath, slot1, slot2) {
            if (!isRealOath(oath[slot1]) || !isRealOath(oath[slot2])) return 'none';
            var r1 = getOathRank(oath[slot1]);
            var r2 = getOathRank(oath[slot2]);
            return r1 >= r2 ? oath[slot1] : oath[slot2];
        }

        var CLASS_DATA = {
            gladiator:    { name: 'Gladiator',    icon: 'assets/icons/gladiator.png',    weapons: ['dagger', 'sword', 'greatsword', 'polearm'], armorTypes: ['physical-plate'] },
            templar:      { name: 'Templar',      icon: 'assets/icons/templar.png',      weapons: ['sword', 'greatsword'],                      armorTypes: ['physical-plate'] },
            assassin:     { name: 'Assassin',     icon: 'assets/icons/assassin.png',     weapons: ['dagger', 'sword'],                          armorTypes: ['physical-leather', 'magical-leather'] },
            ranger:       { name: 'Ranger',       icon: 'assets/icons/ranger.png',       weapons: ['bow'],                                      armorTypes: ['physical-leather'] },
            sorcerer:     { name: 'Sorcerer',     icon: 'assets/icons/sorcerer.png',     weapons: ['orb', 'spellbook'],                         armorTypes: ['magical-cloth'] },
            spiritmaster: { name: 'Spiritmaster', icon: 'assets/icons/spiritmaster.png', weapons: ['orb', 'spellbook'],                         armorTypes: ['magical-cloth'] },
            cleric:       { name: 'Cleric',       icon: 'assets/icons/cleric.png',       weapons: ['mace'],                                     armorTypes: ['magical-chain', 'physical-chain'] },
            chanter:      { name: 'Chanter',      icon: 'assets/icons/chanter.png',      weapons: ['staff', 'mace'],                            armorTypes: ['physical-chain', 'magical-chain'] },
            aethertech:   { name: 'Aethertech',   icon: 'assets/icons/aethertech.png',   weapons: ['aetherKey'],                                armorTypes: ['magical-plate'] },
            gunner:       { name: 'Gunner',       icon: 'assets/icons/gunner.png',       weapons: ['revolver', 'cannon'],                       armorTypes: ['magical-leather'] },
            bard:         { name: 'Bard',         icon: 'assets/icons/bard.png',         weapons: ['harp'],                                     armorTypes: ['magical-cloth'] },
            painter:      { name: 'Painter',      icon: 'assets/icons/painter.png',      weapons: ['paintRings'],                               armorTypes: ['physical-cloth'] }
        };

        var CLASS_ORDER = ['gladiator', 'templar', 'assassin', 'ranger', 'sorcerer', 'spiritmaster',
                           'cleric', 'chanter', 'aethertech', 'gunner', 'bard', 'painter'];

        // Stats that items provide (used for comparison)
        var COMPARISON_STATS = [
            { key: 'attack',          name: 'Attack' },
            { key: 'physicalDef',     name: 'Physical Def' },
            { key: 'magicalDef',      name: 'Magical Def' },
            { key: 'crit',            name: 'Crit' },
            { key: 'hp',              name: 'HP' },
            { key: 'accuracy',        name: 'Accuracy' },
            { key: 'block',           name: 'Block' },
            { key: 'parry',           name: 'Parry' },
            { key: 'healingBoost',    name: 'Healing Boost' },
            { key: 'increasedRegen',  name: 'Increased Regeneration' },
            { key: 'pvpAttack',       name: 'Add. PvP Atk' },
            { key: 'pveAttack',       name: 'Add. PvE Atk' },
            { key: 'pvpDefense',      name: 'Add. PvP Def' },
            { key: 'pveDefense',      name: 'Add. PvE Def' },
            { key: 'magicResist',     name: 'Magic Resist' },
            { key: 'evasion',         name: 'Evasion' }
        ];

        var STAT_KEYS = COMPARISON_STATS.map(function(s) { return s.key; });

        // ═══════════════════════════════════════════════════════════
        // TRANSFORMATION DATA
        // ═══════════════════════════════════════════════════════════

        // Stat display definitions — [base, perEnchant] format in each transform
        // Physical stats: accuracy, critStrike → map to comparison 'accuracy', 'crit'
        // Magical stats:  magicAccuracy, critSpell → map to comparison 'accuracy', 'crit' for magic classes
        // Display-only: attackSpeed, castSpeed, moveSpeed (not enchantable)
        var TRANSFORM_STAT_DEFS = [
            { key: 'attackSpeed',   name: 'Atk. Speed',      unit: '%',  display: true },
            { key: 'castSpeed',     name: 'Cast Speed',      unit: '%',  display: true },
            { key: 'moveSpeed',     name: 'Speed',           unit: '%',  display: true },
            { key: 'accuracy',      name: 'Accuracy',        unit: '',   display: false },
            { key: 'magicAccuracy', name: 'Magical Acc.',     unit: '',  display: false },
            { key: 'critStrike',    name: 'Crit Strike',     unit: '',   display: false },
            { key: 'critSpell',     name: 'Crit Spell',      unit: '',   display: false },
            { key: 'hp',            name: 'HP',              unit: '',   display: false },
            { key: 'healingBoost',  name: 'Healing Boost',   unit: '',   display: false },
            { key: 'pvpAttack',     name: 'Add. PvP Atk',   unit: '',   display: false },
            { key: 'pveAttack',     name: 'Add. PvE Atk',   unit: '',   display: false },
            { key: 'pvpDefense',    name: 'Add. PvP Def',   unit: '',   display: false },
            { key: 'pveDefense',    name: 'Add. PvE Def',   unit: '',   display: false },
            { key: 'magicResist',   name: 'Magic Resist',   unit: '',   display: false },
            { key: 'evasion',       name: 'Evasion',        unit: '',   display: false }
        ];

        // Physical classes use accuracy + critStrike; magical classes use magicAccuracy + critSpell
        var PHYSICAL_CLASSES = ['gladiator', 'templar', 'assassin', 'ranger', 'chanter'];
        function isPhysicalClass(cls) { return PHYSICAL_CLASSES.indexOf(cls) !== -1; }

        var TF_NONE_ICON = 'assets/icons/icon_frame_2.png';

        // All 14 ultimate transforms (display order: Kaisinel → Dark Dragon King)
        // Stats format: [base, perEnchant] — total at enchant N = base + perEnchant × N
        // Display-only speeds are flat numbers (no enchant scaling)
        var TRANSFORMS = [
            { key: 'none', name: 'None', icon: TF_NONE_ICON, stats: {} },
            { key: 'kaisinel', name: 'Kaisinel', icon: 'assets/icons/trans_finality_kaisinel.png', stats: {
                attackSpeed: 60, castSpeed: 45, moveSpeed: 100,
                accuracy: [378, 19], magicAccuracy: [378, 19], critStrike: [331, 17], critSpell: [331, 17],
                healingBoost: [80, 4], pvpAttack: [236, 12], pveAttack: [236, 12],
                pvpDefense: [241, 12], pveDefense: [241, 12]
            }},
            { key: 'marchutan', name: 'Marchutan', icon: 'assets/icons/trans_finality_marchutan.png', stats: {
                attackSpeed: 50, castSpeed: 55, moveSpeed: 100,
                accuracy: [378, 19], magicAccuracy: [378, 19], critStrike: [331, 17], critSpell: [331, 17],
                healingBoost: [80, 4], pvpAttack: [236, 12], pveAttack: [236, 12],
                pvpDefense: [241, 12], pveDefense: [241, 12]
            }},
            { key: 'ereshkigal', name: 'Ereshkigal', icon: 'assets/icons/trans_finality_eresh.png', stats: {
                attackSpeed: 55, castSpeed: 50, moveSpeed: 100,
                accuracy: [378, 19], magicAccuracy: [378, 19], critStrike: [331, 17], critSpell: [331, 17],
                healingBoost: [80, 4], pvpAttack: [472, 24], pveAttack: [180, 9],
                pveDefense: [180, 9]
            }},
            { key: 'tiamat', name: 'Tiamat', icon: 'assets/icons/trans_finality_tiamat.png', stats: {

        // Calculate total shield stats for a given configuration
        // classPhysical: true if class is physical, false if magical
        //   battle shield → attack/crit/accuracy are physical; if class is magical → zero them
        //   scale shield  → attack/crit/accuracy are magical; if class is physical → zero them
        function getShieldStats(shieldSet, shieldType, selectedBonuses, classPhysical) {
            var stats = emptyStats();
            var data = SHIELD_STATS[shieldSet];
            if (!data) return stats;

            var typeKey = shieldType === 'scale' ? 'scale' : 'battle';
            // Shield attack/crit counts only if shield type matches class type
            var shieldMatchesClass = (typeKey === 'battle') ? classPhysical : !classPhysical;

            // Base stats
            var base = data.base[typeKey];
            if (base) {
                STAT_KEYS.forEach(function(k) { stats[k] += (base[k] || 0); });
            }

            // PvP/PvE base (spiked or ciclonica)
            if (data.pvpBase) {
                STAT_KEYS.forEach(function(k) { stats[k] += (data.pvpBase[k] || 0); });
            }
            if (data.pveBase) {
                STAT_KEYS.forEach(function(k) { stats[k] += (data.pveBase[k] || 0); });
            }

            // Enchant bonuses (flat totals)
            if (data.enchant && data.enchant.flat) {
                var flatVals = data.enchant.flat;
                STAT_KEYS.forEach(function(k) { stats[k] += (flatVals[k] || 0); });
            }

            // Zero out attack/crit/accuracy if shield type doesn't match class type
            if (!shieldMatchesClass) {
                stats.attack = 0;
                stats.crit = 0;
                stats.accuracy = 0;
            }

            // Selected bonuses
            var bonusList = data.bonuses[typeKey] || [];
            (selectedBonuses || []).forEach(function(bKey) {
                var bonus = bonusList.find(function(b) { return b.key === bKey; });
                if (bonus) {
                    // attack/crit/accuracy bonuses only count if shield matches class
                    if ((bonus.key === 'attack' || bonus.key === 'crit' || bonus.key === 'accuracy') && !shieldMatchesClass) return;
                    stats[bonus.key] += bonus.value;
                }
            });

            return stats;
        }

        // Get default shield bonuses (first N from the list)
        function getDefaultShieldBonuses(setKey, typeKey) {
            var data = SHIELD_STATS[setKey];
            if (!data) return [];
            var bonusList = data.bonuses[typeKey] || [];
            return bonusList.slice(0, data.maxBonuses).map(function(b) { return b.key; });
        }

        function getDefaultWeaponBonuses(setKey) {
            var fixed = WEAPON_STATS_FIXED[setKey];
            if (!fixed || !fixed.bonuses) return [];
            return fixed.bonuses.slice(0, fixed.maxBonuses).map(function(b) { return b.key; });
        }

        function getDefaultAccBonuses(setKey, slotKey) {
            var statsType = ACC_STATS_TYPE[slotKey] || slotKey;
            var setData = ACCESSORY_STATS[setKey];
            if (!setData) return [];
            var slotData = setData[statsType];
            if (!slotData || !slotData.bonuses) return [];
            if (statsType === 'feather') return ['physicalDef', 'magicalDef', 'hp', 'crit'].slice(0, slotData.maxBonuses);
            return ['hp', 'crit', 'attack', 'accuracy'].slice(0, slotData.maxBonuses);
        }

                                if (Array.isArray(sa.bonuses)) {

                                    var setData = ACCESSORY_STATS[p.accessories[accKey].set];
                                    if (setData && setData[statsType] && setData[statsType].bonuses) {

                                        var maxB = setData[statsType].maxBonuses;

        var selectedClass = 'gladiator';
        var activeTab = 'equipment';
        var weaponConfig = createDefaultWeaponConfig('gladiator');
        var state = {

        // ═══════════════════════════════════════════════════════════
        // STAT CALCULATION
        // ═══════════════════════════════════════════════════════════

        function calculateProfileStats(profileId) {
            var d = calculateDetailedStats(profileId);
            return d.totals;
        }

        function calculateDetailedStats(profileId) {
            var profile = state[profileId];
            var sources = {
                weapons: emptyStats(),
                armor: emptyStats(),
                oaths: emptyStats(),
                manastones: emptyStats(),
                transforms: emptyStats(),
                accessories: emptyStats()
            };

            // Sum armor stats across all 6 slots
            ARMOR_SLOTS.forEach(function(slot) {
                var piece = profile.armor[slot.key];
                var armorStats = getArmorSlotStats(profile.armorType, piece.set, slot.key, piece.enchant);
                STAT_KEYS.forEach(function(k) { sources.armor[k] += (armorStats[k] || 0); });
            });

            // ── Weapon stats (base/bonus/enchant split) ──
            var mwSet = profile.mainWeapon.set;
            var mwType = weaponConfig.mainType;
            var mainParts = getWeaponParts(mwSet, mwType, profile.mainWeapon.enchant, profile.mainWeapon.bonuses);
            var ohType = weaponConfig.offHandType;
            var ohSet = profile.offHand.set;

            if (ohType === 'none') {
                STAT_KEYS.forEach(function(k) {
                    sources.weapons[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k];
                });

            } else if (ohType === 'shield') {
                STAT_KEYS.forEach(function(k) {
                    sources.weapons[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k];
                });
                var sh = profile.shield;
                var sStats = getShieldStats(sh.set, sh.type, sh.bonuses, isPhysicalClass(selectedClass));
                STAT_KEYS.forEach(function(k) { sources.weapons[k] += (sStats[k] || 0); });

            } else if (ohType === 'fuse') {
                var fuseParts = getWeaponParts(ohSet, mwType, profile.offHand.enchant, profile.offHand.bonuses);
                STAT_KEYS.forEach(function(k) {
                    sources.weapons[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k] + fuseParts.bonus[k];
                });
                sources.weapons.attack += Math.floor(fuseParts.baseAtk / 10);

            } else if (ohType === 'weapon') {
                var ohParts = getWeaponParts(ohSet, weaponConfig.offHandWeaponType, profile.offHand.enchant, profile.offHand.bonuses);
                if (selectedClass === 'gunner') {
                    STAT_KEYS.forEach(function(k) { sources.weapons[k] += mainParts.base[k]; });
                } else {
                    STAT_KEYS.forEach(function(k) {
                        sources.weapons[k] += Math.max(mainParts.base[k], ohParts.base[k]);
                    });
                }
                STAT_KEYS.forEach(function(k) {
                    sources.weapons[k] += mainParts.bonus[k] + mainParts.enchant[k]
                              +  ohParts.bonus[k]   + ohParts.enchant[k];
                });
            }

            // Oath pair bonuses
            OATH_PAIRS.forEach(function(pair, pairIdx) {
                var effectiveOath = getEffectiveOath(profile.oath, pair[0], pair[1]);
                var ob = OATH_BONUS[effectiveOath];
                if (ob) {
                    sources.oaths.hp += ob.hp;
                    if (pairIdx === 0) {
                        sources.oaths.accuracy += ob.acc;
                    } else if (pairIdx === 1) {
                        sources.oaths.physicalDef += ob.def;
                        sources.oaths.magicalDef  += ob.def;
                    } else if (pairIdx === 2) {
                        sources.oaths.attack += ob.attack;
                    }
                }
            });

            // Manastone bonuses
            var allGearKeys = ARMOR_SLOT_KEYS.concat(['mainWeapon', 'offHand']).concat(ALL_ACCESSORY_KEYS);
            allGearKeys.forEach(function(gk) {
                var setKey;
                if (gk === 'mainWeapon') setKey = profile.mainWeapon.set;
                else if (gk === 'offHand') setKey = profile.offHand.set;
                else if (profile.armor[gk]) setKey = profile.armor[gk].set;
                else if (profile.accessories && profile.accessories[gk]) setKey = profile.accessories[gk].set;
                else setKey = 'fighting-spirit';
                var slotCount = getManastoneSlotCount(setKey);
                var ms = profile.manastones[gk] || [];
                for (var si = 0; si < slotCount; si++) {
                    var mKey = ms[si];
                    if (mKey && mKey !== 'none') {
                        var mDef = MANASTONES.find(function(m) { return m.key === mKey; });
                        if (mDef) sources.manastones[mDef.stat] += mDef.value;
                    }
                }
            });

            // Transformation stats
            if (profile.transform && profile.transform !== 'none') {
                var tfStats = getTransformComparisonStats(profile.transform, selectedClass, profile.transformEnchant != null ? profile.transformEnchant : 0);
                STAT_KEYS.forEach(function(k) { sources.transforms[k] += (tfStats[k] || 0); });
            }

            // Accessories
            var isPhys = isPhysicalClass(selectedClass);
            ALL_ACCESSORY_KEYS.forEach(function(accKey) {
                var acc = profile.accessories[accKey];
                if (!acc) return;
                var statsType = ACC_STATS_TYPE[accKey];
                var setData = ACCESSORY_STATS[acc.set];
                if (!setData) return;
                var slotData = setData[statsType];
                if (!slotData) return;
                for (var k in slotData.base) { sources.accessories[k] += slotData.base[k]; }
                if (slotData.fixed) {
                    for (var k in slotData.fixed) { sources.accessories[k] += slotData.fixed[k]; }
                }
                if (slotData.physDef) {
                    if (isPhys) { sources.accessories.physicalDef += slotData.physDef; }
                    else { sources.accessories.magicalDef += slotData.physDef; }
                }
                if (slotData.bonuses && acc.bonuses) {
                    acc.bonuses.forEach(function(bk) {
                        var b = slotData.bonuses.find(function(x) { return x.key === bk; });
                        if (b) sources.accessories[b.stat] += b.value;
                    });
                }
            });
            // Starshine set bonuses
            if (profile.accessories.feather.set === 'starshine' &&
                profile.accessories.wings.set === 'starshine' &&
                profile.accessories.bracelet.set === 'starshine') {
                sources.accessories.attack += 190;
                sources.accessories.physicalDef += isPhys ? 375 : 650;
                sources.accessories.magicalDef += isPhys ? 650 : 375;
            }
            var hasStarEarring = profile.accessories.earring1.set === 'starshine' || profile.accessories.earring2.set === 'starshine';
            var hasStarRing = profile.accessories.ring1.set === 'starshine' || profile.accessories.ring2.set === 'starshine';
            if (hasStarEarring && profile.accessories.necklace.set === 'starshine' &&
                hasStarRing && profile.accessories.belt.set === 'starshine') {
                sources.accessories.attack += 335;
            }

            // Compute totals from sources
            var totals = emptyStats();
            var srcKeys = Object.keys(sources);
            STAT_KEYS.forEach(function(k) {
                srcKeys.forEach(function(sk) { totals[k] += sources[sk][k]; });
            });

            return { totals: totals, sources: sources };
        }

        // ═══════════════════════════════════════════════════════════
        // RENDERING
        // ═══════════════════════════════════════════════════════════

        function msIndicator(pid, gearKey, setKey, profile) {
            var slots = getManastoneSlotCount(setKey);
            var ms = profile.manastones[gearKey] || [];
            var filled = 0;
            for (var i = 0; i < slots; i++) { if (ms[i] && ms[i] !== 'none') filled++; }
            var icons = '';
            for (var j = 0; j < slots; j++) {
                var isFilled = ms[j] && ms[j] !== 'none';
                var src = isFilled ? MANASTONE_ICON : EMPTY_SLOT_ICON;
                var imgCls = isFilled ? 'gc-ms-ico gc-ms-ico-filled' : 'gc-ms-ico';
                icons += '<img src="' + src + '" class="' + imgCls + '" alt="">';
            }
            var cls = filled === slots ? ' gc-ms-full' : filled > 0 ? ' gc-ms-partial' : '';
            return '<span class="gc-ms-indicator' + cls + '" title="Manastones: ' + filled + '/' + slots + '">' + icons + '</span>';
        }

        // ── Manastone Modal ──
        function getGearLabel(gearKey) {
            if (gearKey === 'mainWeapon') return 'Main Weapon';

            var accDef = ACCESSORY_SLOTS_UPPER.concat(ACCESSORY_SLOTS_LOWER_L, ACCESSORY_SLOTS_LOWER_R).find(function(s) { return s.key === gearKey; });
            if (accDef) return accDef.name;

            var accDef = ACCESSORY_SLOTS_UPPER.concat(ACCESSORY_SLOTS_LOWER_L, ACCESSORY_SLOTS_LOWER_R).find(function(s) { return s.key === gearKey; });

        // ── Jorgoth Weapon Stats Legend ──
        function buildJorgothLegend(weaponType) {
            var data = JORGOTH_WEAPONS[weaponType];
            if (!data) return '';
            var je = JORGOTH_ENCHANT;
            var is2H = WEAPON_TYPES[weaponType].twoHanded;
            var enchAtk = is2H ? je.enchAtk2h : je.enchAtk1h;
            var enchDef = is2H ? je.enchDef2h : je.enchDef1h;
            var hasHeal = data.v1.healingBoost || data.v2.healingBoost || data.v3.healingBoost;

            // Build T4 variants
            var variants = [
                { key: 'v1', label: 'T4 v1', data: data.v1 },
                { key: 'v2', label: 'T4 v2', data: data.v2 },
                { key: 'v3', label: 'T4 v3', data: data.v3 }
            ];

            // T3 alternatives for all variants (baseAtk: 5200→4700, 2250→2000)
            var t3Variants = ['v1', 'v2', 'v3'].map(function(vk) {
                return { key: vk, label: 'T3 ' + vk, data: data[vk], isT3: true };
            });

            // Compute per-variant display values (T4 only for highlighting)
            var rows = variants.map(function(v) {
                var d = v.data;
                return {
                    label: v.label, data: d, tag: d.tag || null, isT3: false,
                    bonusAtk: d.bonusAtk, crit: d.crit, acc: 2568 + d.acc,
                    def: 170 + d.bonusDef + enchDef, hp: d.hp,
                    heal: d.healingBoost || 0
                };
            });

            // T3 display rows (same bonus stats, lower baseAtk)
            var t3Rows = t3Variants.map(function(v) {
                var d = v.data;
                var t3BaseAtk = d.baseAtk === 2250 ? 2000 : 4700;
                return {
                    label: v.label, data: d, tag: d.tag || null, isT3: true,
                    t3BaseAtk: t3BaseAtk,
                    bonusAtk: d.bonusAtk, crit: d.crit, acc: 2568 + d.acc,
                    def: 170 + d.bonusDef + enchDef, hp: d.hp,
                    heal: d.healingBoost || 0,
                    fuseAtk: Math.floor(t3BaseAtk / 10)
                };
            });

            // For each stat column, find the max and whether values differ (T4 only)
            var statCols = ['bonusAtk', 'crit', 'acc', 'def', 'hp'];
            if (hasHeal) statCols.push('heal');
            var best = {};
            var allSame = {};
            statCols.forEach(function(col) {
                var vals = rows.map(function(r) { return r[col]; });
                best[col] = Math.max.apply(null, vals);
                allSame[col] = vals[0] === vals[1] && vals[1] === vals[2];
            });

            function hlClass(col, val) {
                if (allSame[col] || val <= 0) return '';
                return val === best[col] ? ' class="gc-jorgoth-highlight"' : '';
            }

            var html = '<div class="gc-jorgoth-legend">';
            html += '<div class="gc-jorgoth-legend-title">Jorgoth Variants — ' + WEAPON_TYPES[weaponType].name + '</div>';
            html += '<table class="gc-jorgoth-table">';
            html += '<thead><tr>';
            html += '<th></th><th>Bonus Atk</th><th>Crit</th><th>Acc</th><th>Def</th><th>HP</th>';
            if (hasHeal) html += '<th>Heal</th>';
            html += '<th></th>';
            html += '</tr></thead><tbody>';

            rows.forEach(function(r) {
                var isMasterpiece = r.tag === 'masterpiece';
                var isExtended = r.tag === 'extended';
                var isHighAtk = !allSame.bonusAtk && r.bonusAtk > 0 && r.bonusAtk === best.bonusAtk;

                var rowClass = isMasterpiece ? ' gc-jorgoth-row-mp' : '';
                html += '<tr class="gc-jorgoth-row' + rowClass + '">';
                html += '<td class="gc-jorgoth-variant">' + r.label + '</td>';
                html += '<td' + hlClass('bonusAtk', r.bonusAtk) + '>' + (r.bonusAtk || '—') + '</td>';
                html += '<td' + hlClass('crit', r.crit) + '>' + (r.crit || '—') + '</td>';
                html += '<td' + hlClass('acc', r.acc) + '>' + (r.acc || '—') + '</td>';
                html += '<td' + hlClass('def', r.def) + '>' + r.def + '</td>';
                html += '<td' + hlClass('hp', r.hp) + '>' + r.hp.toLocaleString() + '</td>';
                if (hasHeal) {
                    html += '<td' + hlClass('heal', r.heal) + '>' + (r.heal || '—') + '</td>';
                }
                // Tags
                html += '<td class="gc-jorgoth-tags">';
                if (isMasterpiece) html += '<span class="gc-jorgoth-tag-mp">✦ Masterpiece</span>';
                if (isExtended) html += '<span class="gc-jorgoth-tag-ext">⟐ Extended</span>';
                if (isHighAtk && is2H) html += '<span class="gc-jorgoth-tag-fuse">⚔ Best Fuse</span>';
                html += '</td>';
                html += '</tr>';
            });

            // T3 rows (cheaper alternatives)
            var t3Best = {};
            var t3AllSame = {};
            statCols.forEach(function(col) {
                var vals = t3Rows.map(function(r) { return r[col]; });
                t3Best[col] = Math.max.apply(null, vals);
                t3AllSame[col] = vals[0] === vals[1] && vals[1] === vals[2];
            });

            function t3HlClass(col, val) {
                if (t3AllSame[col] || val <= 0) return '';
                return val === t3Best[col] ? ' class="gc-jorgoth-highlight gc-jorgoth-highlight-dim"' : '';
            }

            var colCount = hasHeal ? 8 : 7;
            html += '<tr class="gc-jorgoth-t3-separator"><td colspan="' + colCount + '"></td></tr>';
            t3Rows.forEach(function(r) {
                var isMasterpiece = r.tag === 'masterpiece';
                var isExtended = r.tag === 'extended';
                var rowClass = isMasterpiece ? ' gc-jorgoth-row-mp' : '';
                html += '<tr class="gc-jorgoth-row gc-jorgoth-row-t3' + rowClass + '">';
                html += '<td class="gc-jorgoth-variant">' + r.label + '</td>';
                html += '<td' + t3HlClass('bonusAtk', r.bonusAtk) + '>' + (r.bonusAtk || '—') + '</td>';
                html += '<td' + t3HlClass('crit', r.crit) + '>' + (r.crit || '—') + '</td>';
                html += '<td' + t3HlClass('acc', r.acc) + '>' + (r.acc || '—') + '</td>';
                html += '<td' + t3HlClass('def', r.def) + '>' + r.def + '</td>';
                html += '<td' + t3HlClass('hp', r.hp) + '>' + r.hp.toLocaleString() + '</td>';
                if (hasHeal) {
                    html += '<td' + t3HlClass('heal', r.heal) + '>' + (r.heal || '—') + '</td>';
                }
                html += '<td class="gc-jorgoth-tags">';
                if (isMasterpiece) html += '<span class="gc-jorgoth-tag-mp">✦ Masterpiece</span>';
                if (isExtended) html += '<span class="gc-jorgoth-tag-ext">⟐ Extended</span>';
                if (is2H) {
                    var atkDiff = Math.floor(r.data.baseAtk / 10) - r.fuseAtk;
                    if (atkDiff > 0) html += '<span class="gc-jorgoth-tag-t3">⚔ Fuse −' + atkDiff + ' atk</span>';
                }
                html += '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            html += '</div>';
            return html;
        }

        // ═══════════════════════════════════════════════════════════
        // COMPARISON TABLE
        // ═══════════════════════════════════════════════════════════

        var SOURCE_LABELS = [
            { key: 'weapons',     icon: '🗡️', name: 'Weapons' },
            { key: 'armor',       icon: '🛡️', name: 'Armor' },
            { key: 'oaths',       icon: '⚔️', name: 'Oaths' },
            { key: 'manastones',  icon: '💎', name: 'Manastones' },
            { key: 'accessories', icon: '📿', name: 'Accessories' },
            { key: 'transforms',  icon: '✨', name: 'Transforms' }
        ];

        function updateComparison() {
            var d1 = calculateDetailedStats(1);
            var d2 = calculateDetailedStats(2);
            var stats1 = d1.totals, stats2 = d2.totals;
            var src1 = d1.sources, src2 = d2.sources;
            var panel = document.getElementById('comparison-panel');

            var wins1 = 0, wins2 = 0, ties = 0;
            COMPARISON_STATS.forEach(function(stat) {
                var v1 = stats1[stat.key], v2 = stats2[stat.key];
                if (v1 > v2) wins1++;
                else if (v2 > v1) wins2++;
                else ties++;
            });

            var html = '<div class="gc-comparison-header">';
            html += '<h2>📈 Stat Comparison</h2>';
            html += '</div>';

            // Summary badges
            html += '<div class="gc-comp-summary">';
            html += '<span class="gc-comp-badge gc-comp-badge-1">' + wins1 + ' SET 1</span>';
            if (ties > 0) html += '<span class="gc-comp-badge gc-comp-badge-tie">' + ties + ' Tied</span>';
            html += '<span class="gc-comp-badge gc-comp-badge-2">' + wins2 + ' SET 2</span>';
            html += '</div>';

            html += '<table class="gc-comp-table">';
            html += '<thead><tr>';
            html += '<th class="gc-comp-th-stat">Stat</th>';
            html += '<th class="gc-comp-th-val">SET 1</th>';
            html += '<th class="gc-comp-th-diff">DIFF</th>';
            html += '<th class="gc-comp-th-val">SET 2</th>';
            html += '</tr></thead>';
            html += '<tbody>';

            COMPARISON_STATS.forEach(function(stat) {
                var v1 = stats1[stat.key];
                var v2 = stats2[stat.key];
                var diff = v1 - v2;
                var maxVal = Math.max(v1, v2, 1);
                var pct1 = Math.round((v1 / maxVal) * 100);
                var pct2 = Math.round((v2 / maxVal) * 100);

                var diffClass = 'gc-diff-zero';
                var diffText = '0';
                if (diff > 0) {
                    diffClass = 'gc-diff-positive';
                    diffText = '+' + formatNum(diff);
                } else if (diff < 0) {
                    diffClass = 'gc-diff-negative';
                    diffText = formatNum(diff);
                }

                var winCls1 = v1 > v2 ? ' gc-comp-val-win' : '';
                var winCls2 = v2 > v1 ? ' gc-comp-val-win' : '';

                // Check if any source has nonzero diff for this stat
                var hasBreakdown = false;
                SOURCE_LABELS.forEach(function(sl) {
                    if (src1[sl.key][stat.key] !== 0 || src2[sl.key][stat.key] !== 0) hasBreakdown = true;
                });

                html += '<tr class="gc-comp-row' + (hasBreakdown ? ' gc-comp-expandable' : '') + '" data-stat="' + stat.key + '">';
                html += '<td class="gc-comp-stat">' + stat.name + (hasBreakdown ? ' <span class="gc-comp-chevron">▸</span>' : '') + '</td>';
                html += '<td class="gc-comp-val' + winCls1 + '"><div class="gc-comp-bar-wrap"><div class="gc-comp-bar gc-comp-bar-1" style="width:' + pct1 + '%"></div><span class="gc-comp-val-text">' + formatNum(v1) + '</span></div></td>';
                html += '<td class="gc-comp-diff ' + diffClass + '">' + diffText + '</td>';
                html += '<td class="gc-comp-val' + winCls2 + '"><div class="gc-comp-bar-wrap"><div class="gc-comp-bar gc-comp-bar-2" style="width:' + pct2 + '%"></div><span class="gc-comp-val-text">' + formatNum(v2) + '</span></div></td>';
                html += '</tr>';

                // Source breakdown rows (hidden by default)
                if (hasBreakdown) {
                    SOURCE_LABELS.forEach(function(sl) {
                        var sv1 = src1[sl.key][stat.key];
                        var sv2 = src2[sl.key][stat.key];
                        if (sv1 === 0 && sv2 === 0) return;
                        var sd = sv1 - sv2;
                        var sdClass = sd > 0 ? 'gc-diff-positive' : sd < 0 ? 'gc-diff-negative' : 'gc-diff-zero';
                        var sdText = sd > 0 ? '+' + formatNum(sd) : sd < 0 ? formatNum(sd) : '—';
                        html += '<tr class="gc-comp-source-row" data-parent="' + stat.key + '">';
                        html += '<td class="gc-comp-source-label">' + sl.icon + ' ' + sl.name + '</td>';
                        html += '<td class="gc-comp-source-val">' + formatNum(sv1) + '</td>';
                        html += '<td class="gc-comp-source-diff ' + sdClass + '">' + sdText + '</td>';
                        html += '<td class="gc-comp-source-val">' + formatNum(sv2) + '</td>';
                        html += '</tr>';
                    });
                }
            });

            html += '</tbody></table>';
            panel.innerHTML = html;
        }

        function formatNum(n) {
            if (n === 0) return '0';
            if (n % 1 !== 0) return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
            return n.toLocaleString();
        }

                        state[id].offHand.set = 'fighting-spirit';

                });

                renderProfile(2);
                updateComparison();
                saveState();

            setOffHandWeaponType: function(type) {
                weaponConfig.offHandWeaponType = type;

                renderProfile(1);
                renderProfile(2);
                updateComparison();
                saveState();
            },

            // Per-profile weapon set/enchant
            setWeaponSet: function(pid, slot, setKey) {
                if (slot === 'main') {
                    state[pid].mainWeapon.set = setKey;
                } else {
                    state[pid].offHand.set = setKey;
                }
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            setWeaponEnchant: function(pid, slot, level) {
                if (slot === 'main') {
                    state[pid].mainWeapon.enchant = parseInt(level);
                } else {
                    state[pid].offHand.enchant = parseInt(level);
                }
                renderProfile(pid);

                    html += '<span class="gc-mana-option-icon"><img src="' + MANASTONE_ICON + '" alt=""></span>';

        // ═══════════════════════════════════════════════════════════
        // SHARE LINK (compact positional encoding)
        // ═══════════════════════════════════════════════════════════

        // Fixed lookup tables for encoding — order must never change (append only)
        var SH_CLASSES   = ['gladiator','templar','assassin','ranger','sorcerer','spiritmaster','cleric','chanter','aethertech','gunner','bard','painter'];
        var SH_WTYPES    = ['dagger','sword','mace','revolver','greatsword','polearm','bow','staff','paintRings','orb','spellbook','aetherKey','cannon','harp'];
        var SH_OHTYPES   = ['none','shield','fuse','weapon'];
        var SH_SHIELDS   = ['scale-phys','scale-mag'];
        var SH_SHIELDSETS = ['spiked-ciclonica','fighting-spirit','salvation','spiked','ciclonica']; // 5 (append-only; 0=legacy)
        var SH_SHIELDTYPES = ['battle','scale']; // 2
        var SH_SHIELDVARS = ['pvp','pve']; // 2 (legacy, for v6-v8 decode)
        var SH_ACCSETS    = ['aeon-guardian','burning-altar','starshine']; // 3 (append-only)
        var SH_ATYPES    = ARMOR_TYPE_OPTIONS.map(function(o) { return o.key; }); // 8 entries
        var SH_ASETS     = ['fighting-spirit','acrimony','presumption']; // 3
        var SH_WSETS     = ['spiked-helper','salvation','fighting-spirit','jorgoth-t4-v1','jorgoth-t4-v2','jorgoth-t4-v3','jorgoth-t3-v1','jorgoth-t3-v2','jorgoth-t3-v3','acrimony','presumption','vision','spiked','ciclonica-helper']; // 14 (append-only; 0=legacy)
        var SH_OATHS     = ['none','silent-skill','legendary-1','legendary-2','legendary-3','ultimate-1','ultimate-2','ultimate-3']; // 8
        var SH_MANAS     = ['none','attack','crit','accuracy','hp','evasion','healBoost','pdef','mdef','magicResist','block','parry']; // 12
        // Armor slot order (fixed)
        var SH_ASLOTS    = ['helmet','shoulders','chest','pants','gloves','boots'];
        // Gear order for manastones: 6 armor + mainWeapon + offHand = 8 × 3 = 24 chars
        var SH_GEARKEYS  = SH_ASLOTS.concat(['mainWeapon','offHand']);
        var SH_TRANSFORMS = TRANSFORM_KEYS; // append-only

        function shEnc(arr, val) { var i = arr.indexOf(val); return (i >= 0 ? i : 0).toString(36); }
        function shDec(arr, ch)  { var i = parseInt(ch, 36); return (i >= 0 && i < arr.length) ? arr[i] : arr[0]; }

        function encodeShareString() {
            // Header: version(1) + class(1) + mainType(1) + ohType(1) + ohWeaponType(1) = 5
            var s = 'c'; // version
            s += shEnc(SH_CLASSES, selectedClass);
            s += shEnc(SH_WTYPES, weaponConfig.mainType);
            s += shEnc(SH_OHTYPES, weaponConfig.offHandType);
            s += shEnc(SH_WTYPES, weaponConfig.offHandWeaponType);

            // Encode each profile: armorType(1) + 6×armor(set+ench=2) + mw(2) + oh(2) + 6×oath(1) + 24×mana(1) = 47
            [1, 2].forEach(function(id) {
                var p = state[id];
                s += shEnc(SH_ATYPES, p.armorType);
                SH_ASLOTS.forEach(function(sk) {
                    s += shEnc(SH_ASETS, p.armor[sk].set);
                    s += (p.armor[sk].enchant - 8).toString(36); // 0-7
                });
                s += shEnc(SH_WSETS, p.mainWeapon.set);
                s += (p.mainWeapon.enchant - 8).toString(36);
                s += shEnc(SH_WSETS, p.offHand.set);
                s += (p.offHand.enchant - 8).toString(36);
                SH_ASLOTS.forEach(function(sk) {
                    s += shEnc(SH_OATHS, p.oath[sk]);
                });
                SH_GEARKEYS.forEach(function(gk) {
                    var ms = p.manastones[gk] || [];
                    for (var i = 0; i < 3; i++) {
                        s += shEnc(SH_MANAS, ms[i] || 'none');
                    }
                });
                // Transform (1 char) + enchant (1 char)
                s += shEnc(SH_TRANSFORMS, p.transform || 'none');
                s += (p.transformEnchant || 0).toString(36);
                // Shield: set(1) + type(1) + bonusMask(2) = 4 chars
                var sh = p.shield;
                s += shEnc(SH_SHIELDSETS, sh.set);
                s += shEnc(SH_SHIELDTYPES, sh.type);
                var shData = SHIELD_STATS[sh.set];
                var typeKey = sh.type === 'scale' ? 'scale' : 'battle';
                var bonusList = shData ? shData.bonuses[typeKey] : [];
                var mask = 0;
                (sh.bonuses || []).forEach(function(bk) {
                    var bi = bonusList.findIndex(function(b) { return b.key === bk; });
                    if (bi >= 0) mask |= (1 << bi);
                });
                // Encode mask as 2 base36 chars (max 1296, need 512)
                s += Math.floor(mask / 36).toString(36);
                s += (mask % 36).toString(36);
                // Weapon bonuses: 1 char each for mainWeapon and offHand (5 bonuses → bitmask 0-31, fits in 1 base36 char)
                [p.mainWeapon, p.offHand].forEach(function(w) {
                    var wFixed = WEAPON_STATS_FIXED[w.set];
                    if (wFixed && wFixed.bonuses) {
                        var wMask = 0;
                        (w.bonuses || []).forEach(function(bk) {
                            var bi = wFixed.bonuses.findIndex(function(b) { return b.key === bk; });
                            if (bi >= 0) wMask |= (1 << bi);
                        });
                        s += wMask.toString(36);
                    } else {
                        s += '0';
                    }
                });
                // Accessories: 9 slots × (set(1) + bonusMask(2)) = 27 chars
                ALL_ACCESSORY_KEYS.forEach(function(accKey) {
                    var acc = p.accessories[accKey];
                    s += shEnc(SH_ACCSETS, acc.set);
                    var statsType = ACC_STATS_TYPE[accKey];
                    var setData = ACCESSORY_STATS[acc.set];
                    var slotData = setData ? setData[statsType] : null;
                    var accMask = 0;
                    if (slotData && slotData.bonuses && acc.bonuses) {
                        acc.bonuses.forEach(function(bk) {
                            var bi = slotData.bonuses.findIndex(function(b) { return b.key === bk; });
                            if (bi >= 0) accMask |= (1 << bi);
                        });
                    }
                    s += Math.floor(accMask / 36).toString(36);
                    s += (accMask % 36).toString(36);
                });
                // Accessory manastones: 9 slots × 3 manastone slots = 27 chars
                ALL_ACCESSORY_KEYS.forEach(function(accKey) {
                    var ms = p.manastones[accKey] || [];
                    for (var i = 0; i < 3; i++) {
                        s += shEnc(SH_MANAS, ms[i] || 'none');
                    }
                });
            });
            return s;
        }

        function decodeShareString(s) {
            if (!s || s.length < 6) return false;
            var pos = 0;
            function next() { return s.charAt(pos++); }

            var ver = next();
            if (ver !== 'c' && ver !== 'b' && ver !== 'a' && ver !== '9' && ver !== '8' && ver !== '7' && ver !== '6' && ver !== '5' && ver !== '4' && ver !== '3' && ver !== '2') return false;

            var cls = shDec(SH_CLASSES, next());
            if (!CLASS_DATA[cls]) return false;
            selectedClass = cls;

            weaponConfig = createDefaultWeaponConfig(cls);
            var mt = shDec(SH_WTYPES, next());
            if (CLASS_DATA[cls].weapons.indexOf(mt) !== -1) weaponConfig.mainType = mt;
            var ot = shDec(SH_OHTYPES, next());
            weaponConfig.offHandType = ot;
            weaponConfig.offHandWeaponType = shDec(SH_WTYPES, next());
            // v5 and below had global shieldType in header; v6 moved to per-profile
            if (ver <= '5') { next(); /* consume legacy shieldType char */ }

            var allowed = getAllowedOffHand(weaponConfig.mainType, cls);
            if (allowed.indexOf(weaponConfig.offHandType) === -1) {
                weaponConfig.offHandType = getDefaultOffHand(weaponConfig.mainType, cls);
            }

            [1, 2].forEach(function(id) {
                var p = createDefaultProfile(cls);
                if (pos >= s.length) { state[id] = p; return; }

                var at = shDec(SH_ATYPES, next());
                if (CLASS_DATA[cls].armorTypes.indexOf(at) !== -1) p.armorType = at;

                SH_ASLOTS.forEach(function(sk) {
                    var aset = shDec(SH_ASETS, next());
                    var aench = parseInt(next(), 36) + 8;
                    if (ARMOR_SET_KEYS.indexOf(aset) !== -1) p.armor[sk].set = aset;
                    if (aench >= 8 && aench <= 15) p.armor[sk].enchant = aench;
                });

                var mwSet = shDec(SH_WSETS, next());
                var mwEnch = parseInt(next(), 36) + 8;
                if (WEAPON_SET_KEYS.indexOf(mwSet) !== -1 && MAINHAND_EXCLUDED_SETS.indexOf(mwSet) === -1) p.mainWeapon.set = mwSet;
                if (mwEnch >= 8 && mwEnch <= 15) p.mainWeapon.enchant = mwEnch;

                var ohSet = shDec(SH_WSETS, next());
                var ohEnch = parseInt(next(), 36) + 8;
                if (WEAPON_SET_KEYS.indexOf(ohSet) !== -1 && OFFHAND_EXCLUDED_SETS.indexOf(ohSet) === -1) p.offHand.set = ohSet;
                if (ohEnch >= 8 && ohEnch <= 15) p.offHand.enchant = ohEnch;

                SH_ASLOTS.forEach(function(sk) {
                    var o = shDec(SH_OATHS, next());
                    if (SH_OATHS.indexOf(o) !== -1) p.oath[sk] = o;
                });

                SH_GEARKEYS.forEach(function(gk) {
                    if (!p.manastones[gk]) p.manastones[gk] = ['none','none','none'];
                    for (var i = 0; i < 3; i++) {
                        var m = shDec(SH_MANAS, next());
                        p.manastones[gk][i] = m;
                    }
                });

                // Transform (v3+)
                if (ver >= '3' && pos < s.length) {
                    var tf = shDec(SH_TRANSFORMS, next());
                    if (TRANSFORM_KEYS.indexOf(tf) !== -1) p.transform = tf;
                }
                // Transform enchant (v4+)
                if (ver >= '4' && pos < s.length) {
                    var raw = parseInt(next(), 36);
                    var te = ver === '4' ? raw + 1 : raw;
                    if (te >= 0 && te <= 20) p.transformEnchant = te;
                }

                // Shield (v6+)
                if (ver >= '6' && pos < s.length) {
                    var shSet = shDec(SH_SHIELDSETS, next());
                    var shType = shDec(SH_SHIELDTYPES, next());
                    var shVar = 'pvp';
                    if (ver <= '8') {
                        // v6-v8: consume legacy variant char and map old spiked-ciclonica → spiked/ciclonica
                        shVar = shDec(SH_SHIELDVARS, next());
                    }
                    if (ver === '6') { next(); /* consume legacy enchant char */ }
                    // Map legacy spiked-ciclonica to separate sets
                    if (shSet === 'spiked-ciclonica') {
                        shSet = shVar === 'pve' ? 'ciclonica' : 'spiked';
                    }
                    if (SHIELD_SET_KEYS.indexOf(shSet) !== -1) p.shield.set = shSet;
                    if (shType === 'battle' || shType === 'scale') p.shield.type = shType;
                    // Decode bonus bitmask (2 chars)
                    var maskHi = parseInt(next(), 36);
                    var maskLo = parseInt(next(), 36);
                    var bonusMask = maskHi * 36 + maskLo;
                    var shData = SHIELD_STATS[p.shield.set];
                    var typeKey = p.shield.type === 'scale' ? 'scale' : 'battle';
                    var bonusList = shData ? shData.bonuses[typeKey] : [];
                    var maxB = shData ? shData.maxBonuses : 0;
                    p.shield.bonuses = [];
                    for (var bi = 0; bi < bonusList.length && p.shield.bonuses.length < maxB; bi++) {
                        if (bonusMask & (1 << bi)) p.shield.bonuses.push(bonusList[bi].key);
                    }
                }

                // v8: consume legacy weapon variant chars
                if (ver === '8' && pos < s.length) {
                    var mwVar = shDec(SH_SHIELDVARS, next()); // reuse same 2-entry array
                    var ohVar = shDec(SH_SHIELDVARS, next());
                    // Map legacy spiked-helper + variant to separate weapon sets
                    if (p.mainWeapon.set === 'spiked-helper') {
                        p.mainWeapon.set = mwVar === 'pve' ? 'ciclonica-helper' : 'spiked';
                    }
                    if (p.offHand.set === 'spiked-helper') {
                        p.offHand.set = ohVar === 'pve' ? 'ciclonica-helper' : 'spiked';
                    }
                }
                // v7 and below: spiked-helper maps to spiked (pvp was default)
                if (ver <= '7') {
                    if (p.mainWeapon.set === 'spiked-helper') p.mainWeapon.set = 'spiked';
                    if (p.offHand.set === 'spiked-helper') p.offHand.set = 'spiked';
                }

                // Weapon bonuses (v10/a+)
                if (ver >= 'a' && pos < s.length) {
                    [p.mainWeapon, p.offHand].forEach(function(w) {
                        var wMask = parseInt(next(), 36);
                        var wFixed = WEAPON_STATS_FIXED[w.set];
                        if (wFixed && wFixed.bonuses) {
                            w.bonuses = [];
                            for (var wi = 0; wi < wFixed.bonuses.length && w.bonuses.length < wFixed.maxBonuses; wi++) {
                                if (wMask & (1 << wi)) w.bonuses.push(wFixed.bonuses[wi].key);
                            }
                        }
                    });
                }

                // Accessories (v11/b+)
                if (ver >= 'b' && pos < s.length) {
                    ALL_ACCESSORY_KEYS.forEach(function(accKey) {
                        var accSet = shDec(SH_ACCSETS, next());
                        var accMaskHi = parseInt(next(), 36);
                        var accMaskLo = parseInt(next(), 36);
                        var accMask = accMaskHi * 36 + accMaskLo;
                        if (ACCESSORY_SET_KEYS.indexOf(accSet) !== -1) p.accessories[accKey].set = accSet;
                        var statsType = ACC_STATS_TYPE[accKey];
                        var setData = ACCESSORY_STATS[p.accessories[accKey].set];
                        var slotData = setData ? setData[statsType] : null;
                        if (slotData && slotData.bonuses) {
                            var maxB = slotData.maxBonuses;
                            p.accessories[accKey].bonuses = [];
                            for (var ai = 0; ai < slotData.bonuses.length && p.accessories[accKey].bonuses.length < maxB; ai++) {
                                if (accMask & (1 << ai)) p.accessories[accKey].bonuses.push(slotData.bonuses[ai].key);
                            }
                            if (p.accessories[accKey].bonuses.length === 0) {
                                p.accessories[accKey].bonuses = getDefaultAccBonuses(p.accessories[accKey].set, accKey);
                            }
                        }
                    });
                }

                // Accessory manastones (v12/c+)
                if (ver >= 'c' && pos < s.length) {
                    ALL_ACCESSORY_KEYS.forEach(function(accKey) {
                        var accSetKey = p.accessories[accKey].set;
                        var slots = getManastoneSlotCount(accSetKey);
                        p.manastones[accKey] = [];
                        for (var mi = 0; mi < slots; mi++) {
                            p.manastones[accKey].push(shDec(SH_MANAS, next()));
                        }
                    });
                }

                state[id] = p;
            });
            return true;
        }

        function generateShareLink() {
            return window.location.origin + window.location.pathname + '#s=' + encodeShareString();
        }

        function loadShareFromURL() {
            var hash = window.location.hash;
            if (hash.indexOf('#s=') !== 0) return false;
            try {
                var code = hash.substring(3);
                var ok = decodeShareString(code);
                if (ok && history.replaceState) {
                    history.replaceState(null, '', window.location.pathname);
                }
                return ok;
            } catch (e) { return false; }
        }

        function showShareToast(message, isError) {
            var toast = document.getElementById('gc-share-toast');
            toast.textContent = message;
            toast.className = 'gc-share-toast' + (isError ? ' gc-share-toast-error' : '') + ' gc-share-toast-show';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.className = 'gc-share-toast';
            }, 2500);
        }

        document.getElementById('gc-share-btn').addEventListener('click', function() {
            var link = generateShareLink();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(function() {
                    showShareToast('✓ Link copied to clipboard!');
                }, function() {
                    prompt('Copy this share link:', link);
                });
            } else {
                prompt('Copy this share link:', link);
            }
        });

        // ═══════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════

        if (!loadShareFromURL()) {
            loadState();
        }
        renderAll();
        if (activeTab !== 'equipment') activateTab(activeTab);

    })();
    </script>
