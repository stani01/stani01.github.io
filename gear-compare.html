        var MACE_OH_ONLY = ['none', 'shield'];

        // Compute allowed off-hand types for a given main weapon + class
        function getAllowedOffHand(mainType, className) {
            var is2H = WEAPON_TYPES[mainType].twoHanded;
            if (is2H) return ['none', 'fuse'];
            if (mainType === 'mace') return ['none', 'shield'];
            if (mainType === 'sword' && className === 'templar') return ['none', 'shield'];
            var opts = ['none', 'weapon'];
            if (SHIELD_WEAPONS.indexOf(mainType) !== -1) opts.push('shield');
            return opts;
        }

        // Compute default off-hand type when switching main weapon
        function getDefaultOffHand(mainType, className) {
            var is2H = WEAPON_TYPES[mainType].twoHanded;
            if (is2H) return 'fuse';
            if (mainType === 'mace') return 'shield';
            if (mainType === 'sword' && className === 'templar') return 'shield';
            return 'weapon';
        }

        // Compute default off-hand weapon type based on main weapon
        function getDefaultOffHandWeapon(mainType, className) {
            if (mainType === 'dagger') return 'sword';
            var cls = CLASS_DATA[className];
            var oneHanded = cls.weapons.filter(function(w) { return !WEAPON_TYPES[w].twoHanded; });

        function getOffHandChoices(mainType, className) {
            var choices = [];
            var allowed = getAllowedOffHand(mainType, className);
            choices.push({ key: 'none', icon: NONE_ICON, label: 'None' });
            if (allowed.indexOf('shield') !== -1) {
                choices.push({ key: 'shield', icon: SHIELD_ICON, label: 'Shield' });
            }
            if (allowed.indexOf('fuse') !== -1) {
                choices.push({ key: 'fuse', icon: WEAPON_TYPES[mainType].icon, label: 'Fuse' });
            }

                var cls = CLASS_DATA[className];

                    if (wc.mainType && cls.weapons.indexOf(wc.mainType) !== -1) weaponConfig.mainType = wc.mainType;

                    if (wc.offHandWeaponType && WEAPON_TYPE_KEYS.indexOf(wc.offHandWeaponType) !== -1) weaponConfig.offHandWeaponType = wc.offHandWeaponType;
                    if (['scale-phys','scale-mag'].indexOf(wc.shieldType) !== -1) weaponConfig.shieldType = wc.shieldType;
                    // Validate off-hand type against current rules
                    var allowed = getAllowedOffHand(weaponConfig.mainType, selectedClass);
                    if (allowed.indexOf(weaponConfig.offHandType) === -1) {
                        weaponConfig.offHandType = getDefaultOffHand(weaponConfig.mainType, selectedClass);
                    }
                }
                [1, 2].forEach(function(id) {
                    var saved = data.profiles[id];
                    if (!saved) return;
                    var p = createDefaultProfile(selectedClass);
                    if (saved.armorType && cls.armorTypes.indexOf(saved.armorType) !== -1) {
                        p.armorType = saved.armorType;

                    if (saved.armor) {
                        ARMOR_SLOTS.forEach(function(slot) {

                            if (sa) {
                                if (sa.set && ARMOR_SET_KEYS.indexOf(sa.set) !== -1) p.armor[slot.key].set = sa.set;
                                if (typeof sa.enchant === 'number' && sa.enchant >= 8 && sa.enchant <= 15) p.armor[slot.key].enchant = sa.enchant;
                            }
                        });
                    }
                    if (saved.mainWeapon) {
                        if (saved.mainWeapon.set && WEAPON_SET_KEYS.indexOf(saved.mainWeapon.set) !== -1 && MAINHAND_EXCLUDED_SETS.indexOf(saved.mainWeapon.set) === -1) p.mainWeapon.set = saved.mainWeapon.set;
                        if (typeof saved.mainWeapon.enchant === 'number' && saved.mainWeapon.enchant >= 8 && saved.mainWeapon.enchant <= 15) p.mainWeapon.enchant = saved.mainWeapon.enchant;
                    }
                    if (saved.offHand) {
                        if (saved.offHand.set && WEAPON_SET_KEYS.indexOf(saved.offHand.set) !== -1 && OFFHAND_EXCLUDED_SETS.indexOf(saved.offHand.set) === -1) {
                            p.offHand.set = saved.offHand.set;
                        }
                        if (typeof saved.offHand.enchant === 'number' && saved.offHand.enchant >= 8 && saved.offHand.enchant <= 15) p.offHand.enchant = saved.offHand.enchant;
                    }
                    if (saved.oath) {
                        var oathKeys = OATH_OPTIONS.map(function(o) { return o.key; });
                        ARMOR_SLOTS.forEach(function(slot) {
                            if (saved.oath[slot.key] && oathKeys.indexOf(saved.oath[slot.key]) !== -1) {
                                p.oath[slot.key] = saved.oath[slot.key];
                            }
                        });
                    }
                    if (saved.manastones) {
                        var allGearKeys = ARMOR_SLOT_KEYS.concat(['mainWeapon', 'offHand']);
                        allGearKeys.forEach(function(gk) {
                            if (saved.manastones[gk] && Array.isArray(saved.manastones[gk])) {
                                var arr = saved.manastones[gk];
                                for (var mi = 0; mi < 3; mi++) {
                                    if (arr[mi] && (arr[mi] === 'none' || MANASTONE_KEYS.indexOf(arr[mi]) !== -1)) {
                                        p.manastones[gk][mi] = arr[mi];
                                    }
                                }
                            }
                        });
                    }
                    state[id] = p;
                });
                return true;
            } catch (e) { return false; }
        }

        var selectedClass = 'gladiator';
        var weaponConfig = createDefaultWeaponConfig('gladiator');
        var state = {
            1: createDefaultProfile('gladiator'),

        // ═══════════════════════════════════════════════════════════
        // STAT CALCULATION
        // ═══════════════════════════════════════════════════════════

        function calculateProfileStats(profileId) {
            var profile = state[profileId];
            var totals = emptyStats();

            // Sum armor stats across all 6 slots
            ARMOR_SLOTS.forEach(function(slot) {
                var piece = profile.armor[slot.key];
                var armorStats = getArmorSlotStats(profile.armorType, piece.set, slot.key, piece.enchant);
                STAT_KEYS.forEach(function(k) { totals[k] += (armorStats[k] || 0); });
            });

            // ── Weapon stats (base/bonus/enchant split) ──
            var mwSet = profile.mainWeapon.set;
            var mwType = weaponConfig.mainType;
            var mainParts = getWeaponParts(mwSet, mwType, profile.mainWeapon.enchant);
            var ohType = weaponConfig.offHandType;
            var ohSet = profile.offHand.set;

            if (ohType === 'none') {
                // Solo weapon: base + bonus + enchant
                STAT_KEYS.forEach(function(k) {
                    totals[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k];
                });

            } else if (ohType === 'shield') {
                // 1H + shield: main hand provides base + bonus + enchant; shield adds bonus-only stats
                STAT_KEYS.forEach(function(k) {
                    totals[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k];
                });
                if (ITEM_DB.shield[ohSet] && ITEM_DB.shield[ohSet][weaponConfig.shieldType]) {
                    var sStats = ITEM_DB.shield[ohSet][weaponConfig.shieldType];
                    STAT_KEYS.forEach(function(k) { totals[k] += (sStats[k] || 0); });
                }

            } else if (ohType === 'fuse') {
                // 2H + fuse: main base + main bonus + main enchant
                //            + fuse bonus only (no fuse enchant)
                //            + floor(fuse.baseAtk / 10) as bonus attack
                var fuseParts = getWeaponParts(ohSet, mwType, profile.offHand.enchant);
                STAT_KEYS.forEach(function(k) {
                    totals[k] += mainParts.base[k] + mainParts.bonus[k] + mainParts.enchant[k] + fuseParts.bonus[k];
                });
                totals.attack += Math.floor(fuseParts.baseAtk / 10);

            } else if (ohType === 'weapon') {
                // 1H dual-wield: base = max per-stat (except gunner: always main hand)
                var ohParts = getWeaponParts(ohSet, weaponConfig.offHandWeaponType, profile.offHand.enchant);
                if (selectedClass === 'gunner') {
                    // Gunner exception: base always from main hand
                    STAT_KEYS.forEach(function(k) { totals[k] += mainParts.base[k]; });
                } else {
                    // Normal: pick highest base per stat
                    STAT_KEYS.forEach(function(k) {
                        totals[k] += Math.max(mainParts.base[k], ohParts.base[k]);
                    });
                }
                // Bonus + enchant from both weapons
                STAT_KEYS.forEach(function(k) {
                    totals[k] += mainParts.bonus[k] + mainParts.enchant[k]
                              +  ohParts.bonus[k]   + ohParts.enchant[k];
                });
            }

            // Oath pair bonuses
            OATH_PAIRS.forEach(function(pair, pairIdx) {
                var effectiveOath = getEffectiveOath(profile.oath, pair[0], pair[1]);
                var ob = OATH_BONUS[effectiveOath];
                if (ob) {
                    totals.hp += ob.hp;
                    if (pairIdx === 0) {
                        // shoulders + helmet → accuracy
                        totals.accuracy += ob.acc;
                    } else if (pairIdx === 1) {
                        // chest + pants → defense
                        totals.physicalDef += ob.def;
                        totals.magicalDef  += ob.def;
                    } else if (pairIdx === 2) {
                        // gloves + boots → attack
                        totals.attack += ob.attack;
                    }
                }
            });

            // Manastone bonuses
            var allGearKeys = ARMOR_SLOT_KEYS.concat(['mainWeapon', 'offHand']);
            allGearKeys.forEach(function(gk) {
                var setKey;
                if (gk === 'mainWeapon') setKey = profile.mainWeapon.set;
                else if (gk === 'offHand') setKey = profile.offHand.set;
                else setKey = profile.armor[gk].set;
                var slotCount = getManastoneSlotCount(setKey);
                var ms = profile.manastones[gk] || [];
                for (var si = 0; si < slotCount; si++) {
                    var mKey = ms[si];
                    if (mKey && mKey !== 'none') {
                        var mDef = MANASTONES.find(function(m) { return m.key === mKey; });
                        if (mDef) totals[mDef.stat] += mDef.value;
                    }
                }
            });

            return totals;
        }

        function msIndicator(pid, gearKey, setKey, profile) {
            var slots = getManastoneSlotCount(setKey);
            var ms = profile.manastones[gearKey] || [];
            var filled = 0;
            for (var i = 0; i < slots; i++) { if (ms[i] && ms[i] !== 'none') filled++; }
            var icons = '';
            for (var j = 0; j < slots; j++) {
                var isFilled = ms[j] && ms[j] !== 'none';
                var src = isFilled ? MANASTONE_ICON : EMPTY_SLOT_ICON;
                var imgCls = isFilled ? 'gc-ms-ico gc-ms-ico-filled' : 'gc-ms-ico';
                icons += '<img src="' + src + '" class="' + imgCls + '" alt="">';
            }
            var cls = filled === slots ? ' gc-ms-full' : filled > 0 ? ' gc-ms-partial' : '';
            return '<span class="gc-ms-indicator' + cls + '" title="Manastones: ' + filled + '/' + slots + '">' + icons + '</span>';
        }

                if (weaponConfig.offHandType === 'weapon') return WEAPON_TYPES[weaponConfig.offHandWeaponType].icon;
                return '';

            var slot = ARMOR_SLOTS.find(function(s) { return s.key === gearKey; });

        // ── Jorgoth Weapon Stats Legend ──
        function buildJorgothLegend(weaponType) {
            var data = JORGOTH_WEAPONS[weaponType];
            if (!data) return '';
            var je = JORGOTH_ENCHANT;
            var is2H = WEAPON_TYPES[weaponType].twoHanded;
            var enchAtk = is2H ? je.enchAtk2h : je.enchAtk1h;
            var enchDef = is2H ? je.enchDef2h : je.enchDef1h;
            var hasHeal = data.v1.healingBoost || data.v2.healingBoost || data.v3.healingBoost;

            // Build T4 variants
            var variants = [
                { key: 'v1', label: 'T4 v1', data: data.v1 },
                { key: 'v2', label: 'T4 v2', data: data.v2 },
                { key: 'v3', label: 'T4 v3', data: data.v3 }
            ];

            // T3 alternatives for all variants (baseAtk: 5200→4700, 2250→2000)
            var t3Variants = ['v1', 'v2', 'v3'].map(function(vk) {
                return { key: vk, label: 'T3 ' + vk, data: data[vk], isT3: true };
            });

            // Compute per-variant display values (T4 only for highlighting)
            var rows = variants.map(function(v) {
                var d = v.data;
                return {
                    label: v.label, data: d, tag: d.tag || null, isT3: false,
                    bonusAtk: d.bonusAtk, crit: d.crit, acc: 2568 + d.acc,
                    def: 170 + d.bonusDef + enchDef, hp: d.hp,
                    heal: d.healingBoost || 0
                };
            });

            // T3 display rows (same bonus stats, lower baseAtk)
            var t3Rows = t3Variants.map(function(v) {
                var d = v.data;
                var t3BaseAtk = d.baseAtk === 2250 ? 2000 : 4700;
                return {
                    label: v.label, data: d, tag: d.tag || null, isT3: true,
                    t3BaseAtk: t3BaseAtk,
                    bonusAtk: d.bonusAtk, crit: d.crit, acc: 2568 + d.acc,
                    def: 170 + d.bonusDef + enchDef, hp: d.hp,
                    heal: d.healingBoost || 0,
                    fuseAtk: Math.floor(t3BaseAtk / 10)
                };
            });

            // For each stat column, find the max and whether values differ (T4 only)
            var statCols = ['bonusAtk', 'crit', 'acc', 'def', 'hp'];
            if (hasHeal) statCols.push('heal');
            var best = {};
            var allSame = {};
            statCols.forEach(function(col) {
                var vals = rows.map(function(r) { return r[col]; });
                best[col] = Math.max.apply(null, vals);
                allSame[col] = vals[0] === vals[1] && vals[1] === vals[2];
            });

            function hlClass(col, val) {
                if (allSame[col] || val <= 0) return '';
                return val === best[col] ? ' class="gc-jorgoth-highlight"' : '';
            }

            var html = '<div class="gc-jorgoth-legend">';
            html += '<div class="gc-jorgoth-legend-title">Jorgoth Variants — ' + WEAPON_TYPES[weaponType].name + '</div>';
            html += '<table class="gc-jorgoth-table">';
            html += '<thead><tr>';
            html += '<th></th><th>Bonus Atk</th><th>Crit</th><th>Acc</th><th>Def</th><th>HP</th>';
            if (hasHeal) html += '<th>Heal</th>';
            html += '<th></th>';
            html += '</tr></thead><tbody>';

            rows.forEach(function(r) {
                var isMasterpiece = r.tag === 'masterpiece';
                var isExtended = r.tag === 'extended';
                var isHighAtk = !allSame.bonusAtk && r.bonusAtk > 0 && r.bonusAtk === best.bonusAtk;

                var rowClass = isMasterpiece ? ' gc-jorgoth-row-mp' : '';
                html += '<tr class="gc-jorgoth-row' + rowClass + '">';
                html += '<td class="gc-jorgoth-variant">' + r.label + '</td>';
                html += '<td' + hlClass('bonusAtk', r.bonusAtk) + '>' + (r.bonusAtk || '—') + '</td>';
                html += '<td' + hlClass('crit', r.crit) + '>' + (r.crit || '—') + '</td>';
                html += '<td' + hlClass('acc', r.acc) + '>' + (r.acc || '—') + '</td>';
                html += '<td' + hlClass('def', r.def) + '>' + r.def + '</td>';
                html += '<td' + hlClass('hp', r.hp) + '>' + r.hp.toLocaleString() + '</td>';
                if (hasHeal) {
                    html += '<td' + hlClass('heal', r.heal) + '>' + (r.heal || '—') + '</td>';
                }
                // Tags
                html += '<td class="gc-jorgoth-tags">';
                if (isMasterpiece) html += '<span class="gc-jorgoth-tag-mp">✦ Masterpiece</span>';
                if (isExtended) html += '<span class="gc-jorgoth-tag-ext">⟐ Extended</span>';
                if (isHighAtk && is2H) html += '<span class="gc-jorgoth-tag-fuse">⚔ Best Fuse</span>';
                html += '</td>';
                html += '</tr>';
            });

            // T3 rows (cheaper alternatives)
            var t3Best = {};
            var t3AllSame = {};
            statCols.forEach(function(col) {
                var vals = t3Rows.map(function(r) { return r[col]; });
                t3Best[col] = Math.max.apply(null, vals);
                t3AllSame[col] = vals[0] === vals[1] && vals[1] === vals[2];
            });

            function t3HlClass(col, val) {
                if (t3AllSame[col] || val <= 0) return '';
                return val === t3Best[col] ? ' class="gc-jorgoth-highlight gc-jorgoth-highlight-dim"' : '';
            }

            var colCount = hasHeal ? 8 : 7;
            html += '<tr class="gc-jorgoth-t3-separator"><td colspan="' + colCount + '"></td></tr>';
            t3Rows.forEach(function(r) {
                var isMasterpiece = r.tag === 'masterpiece';
                var isExtended = r.tag === 'extended';
                var rowClass = isMasterpiece ? ' gc-jorgoth-row-mp' : '';
                html += '<tr class="gc-jorgoth-row gc-jorgoth-row-t3' + rowClass + '">';
                html += '<td class="gc-jorgoth-variant">' + r.label + '</td>';
                html += '<td' + t3HlClass('bonusAtk', r.bonusAtk) + '>' + (r.bonusAtk || '—') + '</td>';
                html += '<td' + t3HlClass('crit', r.crit) + '>' + (r.crit || '—') + '</td>';
                html += '<td' + t3HlClass('acc', r.acc) + '>' + (r.acc || '—') + '</td>';
                html += '<td' + t3HlClass('def', r.def) + '>' + r.def + '</td>';
                html += '<td' + t3HlClass('hp', r.hp) + '>' + r.hp.toLocaleString() + '</td>';
                if (hasHeal) {
                    html += '<td' + t3HlClass('heal', r.heal) + '>' + (r.heal || '—') + '</td>';
                }
                html += '<td class="gc-jorgoth-tags">';
                if (isMasterpiece) html += '<span class="gc-jorgoth-tag-mp">✦ Masterpiece</span>';
                if (isExtended) html += '<span class="gc-jorgoth-tag-ext">⟐ Extended</span>';
                if (is2H) {
                    var atkDiff = Math.floor(r.data.baseAtk / 10) - r.fuseAtk;
                    if (atkDiff > 0) html += '<span class="gc-jorgoth-tag-t3">⚔ Fuse −' + atkDiff + ' atk</span>';
                }
                html += '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            html += '</div>';
            return html;
        }

        function renderArmorSlot(pid, slot, armor, profile, material) {
            var iconUrl = getArmorIcon(material, slot.iconKey);
            var slotOath = profile.oath[slot.key];
            var oathIconUrl = getOathIcon(slot.key, slotOath);
            var html = '<div class="gc-armor-row">';

            html += '<span class="gc-set-name">' + armorSetObj.name + '</span>';
            html += '</div>';
            // Enchant (only for acrimony/presumption)
            var hasArmorEnchant = (armor.set === 'acrimony' || armor.set === 'presumption');
            if (hasArmorEnchant) {
                html += '<span class="gc-enchant-trigger" onclick="GC.openEnchantPicker(' + pid + ',\'armor:' + slot.key + '\',this)">+' + armor.enchant + '</span>';
            }
            // Oath icon trigger
            html += '<div class="gc-oath-picker-wrap">';
            if (oathIconUrl) {
                var isFramed = (slotOath === 'silent-skill');
                html += '<div class="gc-icon-picker gc-oath-pick" onclick="GC.openOathPicker(' + pid + ',\'' + slot.key + '\',this)">';
                html += '<img src="' + oathIconUrl + '" alt="' + slotOath + '" title="' + (OATH_OPTIONS.find(function(o){return o.key===slotOath;})||{}).name + '"' + (isFramed ? ' class="gc-oath-img-framed"' : '') + '>';
                html += '</div>';
            } else {
                html += '<div class="gc-icon-picker gc-oath-pick gc-icon-picker-empty" onclick="GC.openOathPicker(' + pid + ',\'' + slot.key + '\',this)">';
                html += '</div>';
            }

            html += '</div>';

            // Manastone indicator
            html += msIndicator(pid, slot.key, armor.set, profile);

            html += '</div>';
            return html;
        }

        // ═══════════════════════════════════════════════════════════
        // COMPARISON TABLE
        // ═══════════════════════════════════════════════════════════

        function updateComparison() {
            var stats1 = calculateProfileStats(1);
            var stats2 = calculateProfileStats(2);
            var panel = document.getElementById('comparison-panel');
            var html = '<div class="gc-comparison-header">';
            html += '<h2>📈 Total Diff <span class="gc-comp-subtitle">(SET 1 − SET 2)</span></h2>';
            html += '</div>';

            html += '<table class="gc-comp-table">';
            html += '<thead><tr>';
            html += '<th class="gc-comp-th-stat">Stat</th>';
            html += '<th class="gc-comp-th-val">SET 1</th>';
            html += '<th class="gc-comp-th-diff">DIFF</th>';
            html += '<th class="gc-comp-th-val">SET 2</th>';
            html += '</tr></thead>';
            html += '<tbody>';

            COMPARISON_STATS.forEach(function(stat) {
                var v1 = stats1[stat.key];
                var v2 = stats2[stat.key];
                var diff = v1 - v2;

                var diffClass = 'gc-diff-zero';
                var diffText = '0';
                if (diff > 0) {
                    diffClass = 'gc-diff-positive';
                    diffText = '+' + formatNum(diff);
                } else if (diff < 0) {
                    diffClass = 'gc-diff-negative';
                    diffText = formatNum(diff);
                }

                html += '<tr class="gc-comp-row">';
                html += '<td class="gc-comp-stat">' + stat.name + '</td>';
                html += '<td class="gc-comp-val">' + formatNum(v1) + '</td>';
                html += '<td class="gc-comp-diff ' + diffClass + '">' + diffText + '</td>';
                html += '<td class="gc-comp-val">' + formatNum(v2) + '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            panel.innerHTML = html;
        }

        function formatNum(n) {
            if (n === 0) return '0';
            if (n % 1 !== 0) return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
            return n.toLocaleString();
        }

                state[pid].oath[slotKey] = oathKey;
                renderProfile(pid);
                updateComparison();
                saveState();

            openSetPicker: function(pid, slotType, triggerEl) {
                var popup = document.getElementById('gc-set-popup');
                var isOpen = popup.style.display === 'flex';
                document.querySelectorAll('.gc-icon-picker-menu').forEach(function(m) { m.classList.remove('gc-picker-open'); });
                closeOathPopup();
                closeSetPopup();
                closeEnchantPopup();
                if (isOpen && popup.dataset.pid == pid && popup.dataset.slot === slotType) return;

                var sets, currentSet;
                if (slotType === 'main-weapon') {
                    sets = WEAPON_SETS.filter(function(ws) { return MAINHAND_EXCLUDED_SETS.indexOf(ws.key) === -1; });
                    currentSet = state[pid].mainWeapon.set;
                } else if (slotType === 'off-weapon') {
                    sets = WEAPON_SETS.filter(function(ws) { return OFFHAND_EXCLUDED_SETS.indexOf(ws.key) === -1; });
                    currentSet = state[pid].offHand.set;
                } else if (slotType.indexOf('armor:') === 0) {
                    sets = ARMOR_SETS;
                    currentSet = state[pid].armor[slotType.substring(6)].set;
                } else {
                    return;
                }

                var html = '';
                sets.forEach(function(set) {
                    var sel = currentSet === set.key ? ' gc-set-option-selected' : '';
                    html += '<div class="gc-set-option' + sel + '" onclick="GC.pickSet(' + pid + ',\'' + slotType + '\',\'' + set.key + '\')">';

                    html += '</div>';
                });
                popup.innerHTML = html;
                popup.dataset.pid = pid;
                popup.dataset.slot = slotType;

                var rect = triggerEl.getBoundingClientRect();
                popup.style.display = 'flex';
                var popH = popup.offsetHeight;
                var popW = popup.offsetWidth;
                var top = rect.top - popH - 6;
                if (top < 4) top = rect.bottom + 6;
                var left = rect.left + rect.width / 2 - popW / 2;
                if (left < 4) left = 4;
                if (left + popW > window.innerWidth - 4) left = window.innerWidth - popW - 4;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            },

            pickSet: function(pid, slotType, setKey) {
                closeSetPopup();
                if (slotType === 'main-weapon') {
                    state[pid].mainWeapon.set = setKey;
                } else if (slotType === 'off-weapon') {
                    state[pid].offHand.set = setKey;
                } else if (slotType.indexOf('armor:') === 0) {

                var popup = document.getElementById('gc-enchant-popup');
                var isOpen = popup.style.display === 'flex';
                document.querySelectorAll('.gc-icon-picker-menu').forEach(function(m) { m.classList.remove('gc-picker-open'); });
                closeOathPopup();
                closeSetPopup();
                closeEnchantPopup();
                if (isOpen && popup.dataset.pid == pid && popup.dataset.slot === 'armor-type') return;

                var classInfo = CLASS_DATA[selectedClass];
                var currentType = state[pid].armorType;
                var html = '';
                classInfo.armorTypes.forEach(function(atKey) {
                    var opt = ARMOR_TYPE_OPTIONS.find(function(o) { return o.key === atKey; });
                    var sel = currentType === atKey ? ' gc-set-option-selected' : '';
                    html += '<div class="gc-set-option' + sel + '" onclick="GC.pickArmorType(' + pid + ',\'' + atKey + '\')">';
                    html += '<span class="gc-set-option-label">' + opt.name + '</span>';
                    html += '</div>';
                });
                popup.innerHTML = html;
                popup.dataset.pid = pid;
                popup.dataset.slot = 'armor-type';

                var rect = triggerEl.getBoundingClientRect();
                popup.style.display = 'flex';
                var popH = popup.offsetHeight;
                var popW = popup.offsetWidth;
                var top = rect.top - popH - 6;
                if (top < 4) top = rect.bottom + 6;
                var left = rect.left + rect.width / 2 - popW / 2;
                if (left < 4) left = 4;
                if (left + popW > window.innerWidth - 4) left = window.innerWidth - popW - 4;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            },

            pickArmorType: function(pid, armorType) {
                closeEnchantPopup();
                state[pid].armorType = armorType;
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            openOathPicker: function(pid, slotKey, triggerEl) {
                var popup = document.getElementById('gc-oath-popup');
                var isOpen = popup.style.display === 'flex';
                // Close all other pickers
                document.querySelectorAll('.gc-icon-picker-menu').forEach(function(m) { m.classList.remove('gc-picker-open'); });
                closeOathPopup();
                closeSetPopup();
                if (isOpen && popup.dataset.pid == pid && popup.dataset.slot === slotKey) return;

                var currentOath = state[pid].oath[slotKey] || 'none';
                // Find slot key to get correct icons
                var slotObj = ARMOR_SLOTS.find(function(s) { return s.key === slotKey; });
                var html = '';
                OATH_OPTIONS.forEach(function(opt) {
                    var sel = currentOath === opt.key ? ' gc-oath-option-selected' : '';
                    var optIcon = getOathIcon(slotKey, opt.key);
                    html += '<div class="gc-oath-option' + sel + (opt.key === 'none' ? ' gc-oath-option-none' : '') + '" onclick="GC.pickOath(' + pid + ',\'' + slotKey + '\',\'' + opt.key + '\')">';
                    if (opt.key === 'none') {
                        html += '<span class="gc-oath-option-icon"><span class="gc-picker-x">✕</span></span>';
                    } else {
                        html += '<span class="gc-oath-option-icon"><img src="' + optIcon + '" alt="' + opt.name + '"></span>';
                    }
                    html += '<span class="gc-oath-option-label">' + opt.name + '</span>';
                    html += '</div>';
                });
                popup.innerHTML = html;
                popup.dataset.pid = pid;
                popup.dataset.slot = slotKey;

                // Position relative to trigger
                var rect = triggerEl.getBoundingClientRect();
                popup.style.display = 'flex';
                var popH = popup.offsetHeight;
                var popW = popup.offsetWidth;
                var top = rect.top - popH - 6;
                if (top < 4) top = rect.bottom + 6;
                var left = rect.left + rect.width / 2 - popW / 2;
                if (left < 4) left = 4;
                if (left + popW > window.innerWidth - 4) left = window.innerWidth - popW - 4;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            },

            // ── Manastone Modal Handlers ──
            openManaModal: function(pid, scrollToGear) {
                closeOathPopup();
                closeSetPopup();
                closeEnchantPopup();
                var modal = document.getElementById('gc-mana-modal');
                modal.innerHTML = renderManaModal(pid, scrollToGear);
                modal.style.display = 'block';
                modal.dataset.pid = pid;
                document.body.style.overflow = 'hidden';
                if (scrollToGear) {
                    setTimeout(function() {
                        var row = document.getElementById('gc-mana-row-' + scrollToGear);
                        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                }
            },

            closeManaModal: function() {
                var modal = document.getElementById('gc-mana-modal');
                modal.style.display = 'none';
                modal.innerHTML = '';
                document.body.style.overflow = '';
                closeManaSlotPopup();
            },

            applyManaPreset: function(pid, manaKey) {
                var profile = state[pid];
                var allGearKeys = ['mainWeapon'];
                if (weaponConfig.offHandType !== 'none') allGearKeys.push('offHand');
                ARMOR_SLOTS.forEach(function(s) { allGearKeys.push(s.key); });
                allGearKeys.forEach(function(gk) {
                    var setKey = getGearSetKey(pid, gk);
                    var slotCount = getManastoneSlotCount(setKey);
                    if (!profile.manastones[gk]) profile.manastones[gk] = ['none', 'none', 'none'];
                    for (var i = 0; i < slotCount; i++) {
                        profile.manastones[gk][i] = manaKey;
                    }
                });
                // Re-render modal content
                var modal = document.getElementById('gc-mana-modal');
                modal.innerHTML = renderManaModal(pid);
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            clearManastones: function(pid) {
                var profile = state[pid];
                var allGearKeys = ['mainWeapon', 'offHand'];
                ARMOR_SLOTS.forEach(function(s) { allGearKeys.push(s.key); });
                allGearKeys.forEach(function(gk) {
                    if (!profile.manastones[gk]) profile.manastones[gk] = ['none', 'none', 'none'];
                    for (var i = 0; i < 3; i++) {
                        profile.manastones[gk][i] = 'none';
                    }
                });
                var modal = document.getElementById('gc-mana-modal');
                modal.innerHTML = renderManaModal(pid);
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            setManastone: function(pid, gearKey, slotIdx, manaKey) {
                var profile = state[pid];
                if (!profile.manastones[gearKey]) profile.manastones[gearKey] = ['none', 'none', 'none'];
                profile.manastones[gearKey][slotIdx] = manaKey;
                closeManaSlotPopup();
                // Re-render modal
                var modal = document.getElementById('gc-mana-modal');
                modal.innerHTML = renderManaModal(pid);
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            openManaSlotPicker: function(pid, gearKey, slotIdx, triggerEl) {
                var popup = document.getElementById('gc-mana-slot-popup');
                var isOpen = popup.style.display === 'flex';
                closeManaSlotPopup();
                if (isOpen && popup.dataset.pid == pid && popup.dataset.gearKey === gearKey && popup.dataset.slotIdx == slotIdx) return;

                var profile = state[pid];
                var currentMana = (profile.manastones[gearKey] && profile.manastones[gearKey][slotIdx]) || 'none';

                var html = '';
                // None option
                var nSel = currentMana === 'none' ? ' gc-set-option-selected' : '';
                html += '<div class="gc-set-option gc-mana-option-none' + nSel + '" data-mana="none">';
                html += '<span class="gc-mana-option-icon"><img src="' + EMPTY_SLOT_ICON + '" class="gc-mana-slot-icon-empty" alt=""></span>';
                html += '<span class="gc-set-option-label">Empty</span>';
                html += '</div>';

                MANASTONES.forEach(function(m) {
                    var sel = currentMana === m.key ? ' gc-set-option-selected' : '';
                    html += '<div class="gc-set-option' + sel + '" data-mana="' + m.key + '">';
                    html += '<span class="gc-mana-option-icon"><img src="' + MANASTONE_ICON + '" alt=""></span>';
                    html += '<span class="gc-set-option-label">' + m.name + ' +' + m.value + '</span>';
                    html += '</div>';
                });

                popup.innerHTML = html;
                popup.dataset.pid = pid;
                popup.dataset.gearKey = gearKey;
                popup.dataset.slotIdx = slotIdx;

                var rect = triggerEl.getBoundingClientRect();
                popup.style.display = 'flex';
                var popH = popup.offsetHeight;
                var popW = popup.offsetWidth;
                var top = rect.bottom + 4;
                if (top + popH > window.innerHeight - 4) top = rect.top - popH - 4;
                var left = rect.left;
                if (left + popW > window.innerWidth - 4) left = window.innerWidth - popW - 4;
                if (left < 4) left = 4;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }
        };

        function closeOathPopup() {
            var popup = document.getElementById('gc-oath-popup');
            popup.style.display = 'none';
            popup.innerHTML = '';
        }

        function closeSetPopup() {
            var popup = document.getElementById('gc-set-popup');
            popup.style.display = 'none';
            popup.innerHTML = '';
        }

        function closeEnchantPopup() {
            var popup = document.getElementById('gc-enchant-popup');
            popup.style.display = 'none';
            popup.innerHTML = '';
        }

        function closeManaSlotPopup() {
            var popup = document.getElementById('gc-mana-slot-popup');
            if (popup) {
                popup.style.display = 'none';
                popup.innerHTML = '';
            }
        }

        // Shared oath popup (appended to body to escape overflow:hidden)
        var oathPopup = document.createElement('div');
        oathPopup.id = 'gc-oath-popup';
        oathPopup.className = 'gc-oath-popup';
        document.body.appendChild(oathPopup);

        var setPopup = document.createElement('div');
        setPopup.id = 'gc-set-popup';
        setPopup.className = 'gc-set-popup';
        document.body.appendChild(setPopup);

        var enchantPopup = document.createElement('div');
        enchantPopup.id = 'gc-enchant-popup';
        enchantPopup.className = 'gc-set-popup';
        document.body.appendChild(enchantPopup);

        // Manastone modal container
        var manaModal = document.createElement('div');
        manaModal.id = 'gc-mana-modal';
        manaModal.className = 'gc-mana-modal';
        document.body.appendChild(manaModal);

        // Manastone slot picker popup
        var manaSlotPopup = document.createElement('div');
        manaSlotPopup.id = 'gc-mana-slot-popup';
        manaSlotPopup.className = 'gc-set-popup gc-mana-slot-popup';
        document.body.appendChild(manaSlotPopup);

        // Event delegation: mana slot clicks inside modal
        manaModal.addEventListener('click', function(e) {
            var slotEl = e.target.closest('.gc-mana-slot');
            if (slotEl && slotEl.dataset.pid) {
                e.stopPropagation();
                GC.openManaSlotPicker(
                    parseInt(slotEl.dataset.pid),
                    slotEl.dataset.gear,
                    parseInt(slotEl.dataset.slot),
                    slotEl
                );
            }
        });

        // Event delegation: mana option clicks inside slot picker popup
        manaSlotPopup.addEventListener('click', function(e) {
            e.stopPropagation();
            var optEl = e.target.closest('.gc-set-option');
            if (optEl && optEl.dataset.mana !== undefined) {
                var popup = document.getElementById('gc-mana-slot-popup');
                GC.setManastone(
                    parseInt(popup.dataset.pid),
                    popup.dataset.gearKey,
                    parseInt(popup.dataset.slotIdx),
                    optEl.dataset.mana
                );
            }
        });

        // Close pickers on outside click
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.gc-wc-item')) {
                document.querySelectorAll('.gc-icon-picker-menu').forEach(function(m) {
                    m.classList.remove('gc-picker-open');
                });
            }
            if (!e.target.closest('.gc-oath-popup') && !e.target.closest('.gc-oath-pick')) {
                closeOathPopup();
            }
            if (!e.target.closest('.gc-set-popup') && !e.target.closest('.gc-set-trigger') && !e.target.closest('.gc-enchant-trigger') && !e.target.closest('#gc-enchant-popup')) {
                closeSetPopup();
                closeEnchantPopup();
            }
            // Close mana slot popup on outside click
            if (!e.target.closest('#gc-mana-slot-popup') && !e.target.closest('.gc-mana-slot')) {
                closeManaSlotPopup();
            }
        });

        // Close oath popup on scroll
        window.addEventListener('scroll', function() { closeOathPopup(); closeSetPopup(); closeEnchantPopup(); }, true);

        // Close mana modal on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var modal = document.getElementById('gc-mana-modal');
                if (modal && modal.style.display === 'block') {
                    GC.closeManaModal();
                }
            }
        });

        // ═══════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════

        loadState();
        renderAll();

    })();
    </script>

</body>
</html>
