        function isRealOath(oathKey) {

        function getEffectiveOath(oath, slot1, slot2) {
            if (!isRealOath(oath[slot1]) || !isRealOath(oath[slot2])) return 'none';

        // Calculate actual stats for one armor slot
        function getArmorSlotStats(armorType, setKey, slotKey, enchantLevel) {
            var s = emptyStats();

            if (setKey === 'fighting-spirit') {
                var tier = FS_TIER[slotKey];
                var def = FS_DEF[armorType];
                if (!def) return s;
                var d = def[tier];
                var c = FS_COMMON[tier];
                s.physicalDef = d[0] + c.bonusDef + c.enchDef;
                s.magicalDef = d[1] + c.bonusDef + c.enchDef;
                s.hp = c.hp;
                s.attack = c.attack + c.enchAtk;
                s.crit = c.crit;
                s.accuracy = c.accuracy;
                s.evasion = c.evasion;
                s.magicResist = c.magicResist;
                s.increasedRegen = c.increasedRegen;
            } else if (setKey === 'acrimony' || setKey === 'presumption') {
                var tier = EX_TIER[slotKey];
                var baseDef = EX_BASE_DEF[armorType];
                if (!baseDef) return s;
                var bd = baseDef[tier];
                var ec = EX_COMMON[tier];
                s.physicalDef = bd[0];
                s.magicalDef = bd[1];
                s.hp = ec.hp;
                s.attack = ec.attack;
                // Base bonus
                if (setKey === 'acrimony') {
                    s.attack += 20; s.physicalDef += 10; s.magicalDef += 10; s.hp += 20; s.crit += 20;
                } else {
                    s.attack += 20; s.physicalDef += 20; s.magicalDef += 20; s.hp += 20;
                }
                // Enchant bonuses (+8 to +15)
                var bonusTable = (setKey === 'acrimony') ? ACRI_ENCHANT : PRES_ENCHANT;
                if (enchantLevel >= 8 && bonusTable[enchantLevel]) {
                    var b = bonusTable[enchantLevel];
                    s.attack += b.attack[tier];
                    s.physicalDef += b.def[tier];
                    s.magicalDef += b.def[tier];
                    s.hp += b.hp[tier];
                    if (setKey === 'acrimony' && b.crit) {
                        s.crit += b.crit[tier];
                    }
                }
            }
            return s;
        }

        // ═══════════════════════════════════════════════════════════

        // ═══════════════════════════════════════════════════════════

        function calculateProfileStats(profileId) {
            var profile = state[profileId];
            var totals = emptyStats();

            // Sum armor stats across all 6 slots
            ARMOR_SLOTS.forEach(function(slot) {
                var piece = profile.armor[slot.key];
                var armorStats = getArmorSlotStats(profile.armorType, piece.set, slot.key, piece.enchant);
                STAT_KEYS.forEach(function(k) { totals[k] += (armorStats[k] || 0); });
            });

            // Main weapon (type from shared weaponConfig)
            var mwSet = profile.mainWeapon.set;
            var mwType = weaponConfig.mainType;
            var wStats = getWeaponStats(mwSet, mwType, profile.mainWeapon.enchant);
            STAT_KEYS.forEach(function(k) { totals[k] += (wStats[k] || 0); });

            // Off-hand (type from shared weaponConfig)
            var ohType = weaponConfig.offHandType;
            var ohSet = profile.offHand.set;
            if (ohType === 'shield') {
                if (ITEM_DB.shield[ohSet] && ITEM_DB.shield[ohSet][weaponConfig.shieldType]) {
                    var sStats = ITEM_DB.shield[ohSet][weaponConfig.shieldType];
                    STAT_KEYS.forEach(function(k) { totals[k] += (sStats[k] || 0); });
                }
            } else if (ohType === 'fuse') {
                var fStats = getWeaponStats(ohSet, mwType, profile.offHand.enchant);
                STAT_KEYS.forEach(function(k) { totals[k] += (fStats[k] || 0); });
            } else if (ohType === 'weapon') {
                var owStats = getWeaponStats(ohSet, weaponConfig.offHandWeaponType, profile.offHand.enchant);
                STAT_KEYS.forEach(function(k) { totals[k] += (owStats[k] || 0); });
            }

            // Oath pair bonuses
            OATH_PAIRS.forEach(function(pair, pairIdx) {
                var effectiveOath = getEffectiveOath(profile.oath, pair[0], pair[1]);
                var ob = OATH_BONUS[effectiveOath];
                if (ob) {
                    totals.hp += ob.hp;
                    if (pairIdx === 0) {
                        // shoulders + helmet → accuracy
                        totals.accuracy += ob.acc;
                    } else if (pairIdx === 1) {
                        // chest + pants → defense
                        totals.physicalDef += ob.def;
                        totals.magicalDef  += ob.def;
                    } else if (pairIdx === 2) {
                        // gloves + boots → attack
                        totals.attack += ob.attack;
                    }
                }
            });

            return totals;
        }

                html += '<div class="gc-slot-icon gc-slot-icon-empty"></div>';
            }
            html += '<div class="gc-wc-label">Off-hand</div>';
            html += '<select class="gc-select" onchange="GC.setOffHandType(this.value)">';
            html += '<option value="none"' + (ohType === 'none' ? ' selected' : '') + '>None</option>';
            if(mainIs2H) {
                html += '<option value="fuse"' + (ohType === 'fuse' ? ' selected' : '') + '>Fuse</option>';
            }
            if (!mainIs2H) {
                html += '<option value="weapon"' + (ohType === 'weapon' ? ' selected' : '') + '>Off-hand Weapon</option>';
                if (canShield) {
                    html += '<option value="shield"' + (ohType === 'shield' ? ' selected' : '') + '>Shield</option>';
                }
            }
            html += '</select>';
            if (ohType === 'weapon') {
                var oneHanded = classInfo.weapons.filter(function(w) { return !WEAPON_TYPES[w].twoHanded; });
                html += '<select class="gc-select" onchange="GC.setOffHandWeaponType(this.value)">';
                oneHanded.forEach(function(wKey) {
                    var w = WEAPON_TYPES[wKey];
                    var s = weaponConfig.offHandWeaponType === wKey ? ' selected' : '';
                    html += '<option value="' + wKey + '"' + s + '>' + w.name + '</option>';
                });
                html += '</select>';
            }
            html += '</div>';

            html += '</div>';
            el.innerHTML = html;
        }

        function renderProfile(id) {
            var container = document.getElementById('profile-' + id);
            var profile = state[id];
            var classInfo = CLASS_DATA[selectedClass];
            var material = getArmorMaterial(profile.armorType);
            var html = '';

            // ── Header ──
            html += '<div class="gc-profile-header">';
            html += '<span class="gc-set-title">SET ' + id + '</span>';
            html += '</div>';

            // ── Armor Section ──
            html += '<div class="gc-section">';
            html += '<div class="gc-section-label-row">';
            html += '<span class="gc-section-label">⚔️ Armor</span>';
            if (classInfo.armorTypes.length > 1) {
                html += '<select class="gc-select gc-select-inline" onchange="GC.setArmorType(' + id + ',this.value)">';
                classInfo.armorTypes.forEach(function(atKey) {
                    var opt = ARMOR_TYPE_OPTIONS.find(function(o) { return o.key === atKey; });
                    var s = profile.armorType === atKey ? ' selected' : '';
                    html += '<option value="' + atKey + '"' + s + '>' + opt.name + '</option>';
                });
                html += '</select>';
            } else {
                var singleOpt = ARMOR_TYPE_OPTIONS.find(function(o) { return o.key === classInfo.armorTypes[0]; });
                html += '<span class="gc-armor-type-badge">' + singleOpt.name + '</span>';
            }
            html += '</div>';

            html += '<div class="gc-armor-list">';
            ARMOR_SLOTS.forEach(function(slot) {
                var armor = profile.armor[slot.key];
                html += renderArmorSlot(id, slot, armor, profile, material);
            });
            html += '</div></div>';

            // ── Weapons Section ──
            html += '<div class="gc-section">';
            html += '<div class="gc-section-label">🗡️ Weapons</div>';
            html += '<div class="gc-armor-list">';
            var mwt = WEAPON_TYPES[weaponConfig.mainType];
            html += '<div class="gc-armor-row">';
            html += '<div class="gc-slot-icon"><img src="' + mwt.icon + '" alt="' + mwt.name + '"></div>';
            html += '<div class="gc-slot-label">' + mwt.name + '</div>';
            html += '<select class="gc-select" onchange="GC.setWeaponSet(' + id + ',\'main\',this.value)">';
            WEAPON_SETS.forEach(function(set) {
                var s = profile.mainWeapon.set === set.key ? ' selected' : '';
                html += '<option value="' + set.key + '"' + s + '>' + set.name + '</option>';
            });
            html += '</select>';
            if (profile.mainWeapon.set === 'acrimony' || profile.mainWeapon.set === 'presumption') {
                html += '<select class="gc-select gc-select-sm" onchange="GC.setWeaponEnchant(' + id + ',\'main\',this.value)">';
                for (var ei = 8; ei <= 15; ei++) {
                    var es = profile.mainWeapon.enchant === ei ? ' selected' : '';
                    html += '<option value="' + ei + '"' + es + '>+' + ei + '</option>';
                }
                html += '</select>';
            }
            var mwTag = getJorgothTag(weaponConfig.mainType, profile.mainWeapon.set);
            if (mwTag) {
                var tagClass = mwTag === 'masterpiece' ? 'gc-weapon-tag-masterpiece' : 'gc-weapon-tag-extended';
                var tagLabel = mwTag === 'masterpiece' ? '✦ Masterpiece' : '⟐ Extended';
                html += '<span class="gc-weapon-tag ' + tagClass + '">' + tagLabel + '</span>';
            }
            html += '</div>';
            if (weaponConfig.offHandType !== 'none') {
                var ohType = weaponConfig.offHandType;
                var ohIcon, ohLabel;
                if (ohType === 'shield') {
                    ohIcon = 'assets/icons/icon_item_equip_shield_f01.png';
                    ohLabel = 'Shield';
                } else if (ohType === 'fuse') {
                    ohIcon = mwt.icon;
                    ohLabel = 'Fuse';
                } else {
                    var ohWt = WEAPON_TYPES[weaponConfig.offHandWeaponType];
                    ohIcon = ohWt.icon;
                    ohLabel = ohWt.name + ' (OH)';
                }
                var ohSets = WEAPON_SETS.filter(function(ws) { return OFFHAND_EXCLUDED_SETS.indexOf(ws.key) === -1; });
                html += '<div class="gc-armor-row">';
                html += '<div class="gc-slot-icon"><img src="' + ohIcon + '" alt="' + ohLabel + '"></div>';
                html += '<div class="gc-slot-label">' + ohLabel + '</div>';
                html += '<select class="gc-select" onchange="GC.setWeaponSet(' + id + ',\'offHand\',this.value)">';
                ohSets.forEach(function(set) {
                    var s = profile.offHand.set === set.key ? ' selected' : '';
                    html += '<option value="' + set.key + '"' + s + '>' + set.name + '</option>';
                });
                html += '</select>';
                if (ohType === 'shield') {
                    html += '<select class="gc-select" onchange="GC.setShieldType(this.value)">';
                    html += '<option value="scale-phys"' + (weaponConfig.shieldType === 'scale-phys' ? ' selected' : '') + '>Battle (Physical)</option>';
                    html += '<option value="scale-mag"' + (weaponConfig.shieldType === 'scale-mag' ? ' selected' : '') + '>Scale (Magical)</option>';
                    html += '</select>';
                } else if (ohType === 'fuse' || ohType === 'weapon') {
                    // No enchant for fuse

                }else {
                    html += '<select class="gc-select gc-select-sm" onchange="GC.setWeaponEnchant(' + id + ',\'offHand\',this.value)">';
                    for (var oi = 8; oi <= 15; oi++) {
                        var os = profile.offHand.enchant === oi ? ' selected' : '';
                        html += '<option value="' + oi + '"' + os + '>+' + oi + '</option>';
                    }
                    html += '</select>';
                }
                html += '</div>';
            }
            html += '</div></div>';

            container.innerHTML = html;
        }

        function renderArmorSlot(pid, slot, armor, profile, material) {
            var iconUrl = getArmorIcon(material, slot.iconKey);
            var slotOath = profile.oath[slot.key];
            var oathIconUrl = getOathIcon(slot.key, slotOath);
            var html = '<div class="gc-armor-row">';

            // Armor icon
            html += '<div class="gc-slot-icon"><img src="' + iconUrl + '" alt="' + slot.name + '"></div>';
            // Name
            html += '<div class="gc-slot-label">' + slot.name + '</div>';
            // Set
            html += '<select class="gc-select" onchange="GC.setArmor(' + pid + ',\'' + slot.key + '\',this.value)">';
            ARMOR_SETS.forEach(function(set) {
                var s = armor.set === set.key ? ' selected' : '';
                html += '<option value="' + set.key + '"' + s + '>' + set.name + '</option>';
            });
            html += '</select>';
            // Enchant
            if (armor.set === 'acrimony' || armor.set === 'presumption') {
                html += '<select class="gc-select gc-select-sm" onchange="GC.setArmorEnchant(' + pid + ',\'' + slot.key + '\',this.value)">';
                for (var i = 8; i <= 15; i++) {
                    var s = armor.enchant === i ? ' selected' : '';
                    html += '<option value="' + i + '"' + s + '>+' + i + '</option>';
                }
                html += '</select>';
            }
            // Oath icon
            if (oathIconUrl) {
                var isFramed = (slotOath === 'silent-skill');
                html += '<div class="gc-oath-icon' + (isFramed ? ' gc-oath-icon-framed' : '') + '">';
                html += '<img src="' + oathIconUrl + '" alt="Oath" class="gc-oath-img">';
                if (isFramed) html += '<img src="' + OATH_FRAME + '" alt="" class="gc-oath-frame">';
                html += '</div>';
            } else {
                html += '<div class="gc-oath-icon gc-oath-icon-empty"></div>';
            }
            // Oath dropdown
            html += '<select class="gc-select gc-select-oath" onchange="GC.setOath(' + pid + ',\'' + slot.key + '\',this.value)">';
            OATH_OPTIONS.forEach(function(opt) {
                var s = slotOath === opt.key ? ' selected' : '';
                html += '<option value="' + opt.key + '"' + s + '>' + opt.name + '</option>';
            });
            html += '</select>';

            html += '</div>';
            return html;
        }

        // ═══════════════════════════════════════════════════════════
        // COMPARISON TABLE
        // ═══════════════════════════════════════════════════════════

        function updateComparison() {
            var stats1 = calculateProfileStats(1);
            var stats2 = calculateProfileStats(2);
            var panel = document.getElementById('comparison-panel');
            var html = '<div class="gc-comparison-header">';
            html += '<h2>📈 Total Diff <span class="gc-comp-subtitle">(SET 1 − SET 2)</span></h2>';
            html += '</div>';

            html += '<table class="gc-comp-table">';
            html += '<thead><tr>';
            html += '<th class="gc-comp-th-stat">Stat</th>';
            html += '<th class="gc-comp-th-val">SET 1</th>';
            html += '<th class="gc-comp-th-diff">DIFF</th>';
            html += '<th class="gc-comp-th-val">SET 2</th>';
            html += '</tr></thead>';
            html += '<tbody>';

            COMPARISON_STATS.forEach(function(stat) {
                var v1 = stats1[stat.key];
                var v2 = stats2[stat.key];
                var diff = v1 - v2;

                var diffClass = 'gc-diff-zero';
                var diffText = '0';
                if (diff > 0) {
                    diffClass = 'gc-diff-positive';
                    diffText = '+' + formatNum(diff);
                } else if (diff < 0) {
                    diffClass = 'gc-diff-negative';
                    diffText = formatNum(diff);
                }

                html += '<tr class="gc-comp-row">';
                html += '<td class="gc-comp-stat">' + stat.name + '</td>';
                html += '<td class="gc-comp-val">' + formatNum(v1) + '</td>';
                html += '<td class="gc-comp-diff ' + diffClass + '">' + diffText + '</td>';
                html += '<td class="gc-comp-val">' + formatNum(v2) + '</td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            panel.innerHTML = html;
        }

        function formatNum(n) {
            if (n === 0) return '0';
            if (n % 1 !== 0) return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
            return n.toLocaleString();
        }

        // ═══════════════════════════════════════════════════════════
        // EVENT HANDLERS
        // ═══════════════════════════════════════════════════════════

        window.GC = {
            selectClass: function(className) {
                selectedClass = className;
                var cls = CLASS_DATA[className];
                // Reset weapon config for new class
                if (cls.weapons.indexOf(weaponConfig.mainType) === -1) {
                    weaponConfig = createDefaultWeaponConfig(className);
                } else {
                    var mainIs2H = WEAPON_TYPES[weaponConfig.mainType].twoHanded;
                    if (mainIs2H && (weaponConfig.offHandType === 'shield' || weaponConfig.offHandType === 'weapon')) {
                        weaponConfig.offHandType = 'none';
                    }
                    if (weaponConfig.offHandType === 'shield' && SHIELD_WEAPONS.indexOf(weaponConfig.mainType) === -1) {
                        weaponConfig.offHandType = 'none';
                    }
                    var oneHanded = cls.weapons.filter(function(w) { return !WEAPON_TYPES[w].twoHanded; });
                    if (weaponConfig.offHandType === 'weapon' && oneHanded.indexOf(weaponConfig.offHandWeaponType) === -1) {
                        weaponConfig.offHandWeaponType = oneHanded[0] || cls.weapons[0];
                    }
                }
                [1, 2].forEach(function(id) {
                    var p = state[id];
                    if (cls.armorTypes.indexOf(p.armorType) === -1) {
                        p.armorType = cls.armorTypes[0];
                    }
                });
                renderAll();
                saveState();
            },

            setArmorType: function(pid, armorType) {
                state[pid].armorType = armorType;
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            setArmor: function(pid, slotKey, setKey) {
                state[pid].armor[slotKey].set = setKey;
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            setArmorEnchant: function(pid, slotKey, level) {
                state[pid].armor[slotKey].enchant = parseInt(level);
                updateComparison();
                saveState();
            },

            setOath: function(pid, slotKey, oath) {
                state[pid].oath[slotKey] = oath;
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            // Shared weapon config handlers
            setMainWeaponType: function(type) {
                weaponConfig.mainType = type;
                var mainIs2H = WEAPON_TYPES[type].twoHanded;
                if (mainIs2H && (weaponConfig.offHandType === 'shield' || weaponConfig.offHandType === 'weapon')) {
                    weaponConfig.offHandType = 'none';
                }
                if (weaponConfig.offHandType === 'shield' && SHIELD_WEAPONS.indexOf(type) === -1) {
                    weaponConfig.offHandType = 'none';
                }
                renderWeaponConfig();
                renderProfile(1);
                renderProfile(2);
                updateComparison();
                saveState();
            },

            setOffHandType: function(type) {
                weaponConfig.offHandType = type;
                [1, 2].forEach(function(id) {
                    if (type !== 'none' && OFFHAND_EXCLUDED_SETS.indexOf(state[id].offHand.set) !== -1) {
                        state[id].offHand.set = 'fighting-spirit';
                    }
                });
                renderWeaponConfig();
                renderProfile(1);
                renderProfile(2);
                updateComparison();
                saveState();
            },

            setOffHandWeaponType: function(type) {
                weaponConfig.offHandWeaponType = type;
                renderWeaponConfig();
                renderProfile(1);
                renderProfile(2);
                updateComparison();
                saveState();
            },

            setShieldType: function(type) {
                weaponConfig.shieldType = type;
                renderWeaponConfig();
                updateComparison();
                saveState();
            },

            // Per-profile weapon set/enchant
            setWeaponSet: function(pid, slot, setKey) {
                if (slot === 'main') {
                    state[pid].mainWeapon.set = setKey;
                } else {
                    state[pid].offHand.set = setKey;
                }
                renderProfile(pid);
                updateComparison();
                saveState();
            },

            setWeaponEnchant: function(pid, slot, level) {
                if (slot === 'main') {
                    state[pid].mainWeapon.enchant = parseInt(level);
                } else {
                    state[pid].offHand.enchant = parseInt(level);
                }
                updateComparison();
                saveState();
            }
        };

        // ═══════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════

        loadState();
        renderAll();

    })();
    </script>

</body>
</html>
